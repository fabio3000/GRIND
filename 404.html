
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRIND. | 404 Signal Lost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            overflow-x: hidden; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .glitch-bg { 
            background-image: radial-gradient(circle at 50% 50%, #1a0a00 0%, #050505 80%); 
        }
        
        .btn-grind { 
            background: white; 
            color: black; 
            font-weight: 900; 
            font-style: italic; 
            text-transform: uppercase; 
            padding: 16px 32px; 
            font-size: 12px; 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.1); 
            cursor: pointer; 
            border-radius: 4px; 
            border: none; 
            text-decoration: none;
            letter-spacing: 0.1em;
        }
        
        .btn-grind:hover { 
            background: #ff4d00; 
            color: white; 
            box-shadow: 0 4px 20px rgba(255, 77, 0, 0.4); 
        }

        @keyframes pulse-slow { 
            0%, 100% { opacity: 0.3; transform: scale(0.95); } 
            50% { opacity: 1; transform: scale(1.05); } 
        }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
    </style>
</head>
<body class="flex flex-col relative select-none">

    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center min-h-[100dvh] relative z-20 glitch-bg">
        
        <!-- Radar / Scanner Animation -->
        <div class="w-24 h-24 border border-[#ff4d00]/30 rounded-full flex items-center justify-center mb-8 animate-pulse-slow relative">
            <div class="absolute inset-0 border-t-2 border-[#ff4d00] rounded-full animate-spin" style="animation-duration: 3s;"></div>
            <svg class="w-8 h-8 text-[#ff4d00]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>

        <p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-[0.4em] mb-4">Grind Network</p>
        
        <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-2 text-white leading-none drop-shadow-2xl">404</h1>
        
        <h2 class="text-xl md:text-2xl font-black italic uppercase text-[#ff4d00] tracking-widest mb-6">Signal Lost</h2>
        
        <p class="text-gray-500 font-bold text-xs md:text-sm max-w-sm mx-auto uppercase tracking-widest leading-relaxed mb-12">
            Die angeforderte Position existiert nicht auf der Grind Map. Der Link ist entweder veraltet oder fehlerhaft.
        </p>
        
        <!-- Return Button directly to index.html -->
        <a href="index.html" class="btn-grind">Return to Base</a>

        <div class="absolute bottom-10 left-0 right-0 flex justify-center">
            <p class="text-[#1f1f1f] text-[9px] uppercase tracking-widest font-black">© 2026 GRIND NETWORK.</p>
        </div>
    </div>

</body>
</html>
