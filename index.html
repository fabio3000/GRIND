<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIND. | Season 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .grind-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); }
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; transition: all 0.3s ease; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        
        .level-node { min-width: 140px; position: relative; }
        .level-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #1f1f1f; z-index: 0; }
        .level-line.active { background: #ff4d00; height: 2px; }
        
        .reward-box { width: 100px; height: 85px; border: 1px solid #1f1f1f; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; border-radius: 4px; }
        .reward-box.unlocked { border-color: #ff4d00; background: #140a00; box-shadow: 0 0 15px rgba(255, 77, 0, 0.1); }
        .reward-box.pro { border-color: #4c1d95; }
        .reward-box.pro.unlocked { background: #1a0a2e; border-color: #7c3aed; }

        .tag-free { background: #333; color: white; font-size: 7px; font-weight: 900; padding: 1px 5px; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        .tag-pro { background: #7c3aed; color: white; font-size: 7px; font-weight: 900; padding: 1px 4px; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        
        .week-btn { border: 1px solid #1f1f1f; background: #0a0a0a; transition: all 0.2s; }
        .week-btn.active { background: #ff4d00; color: white; border-color: #ff4d00; font-weight: 900; }
        .week-locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-4xl font-black italic tracking-tighter">GRIND<span class="text-orange-600">.</span></h1>
        <div id="auth-controls">
            <button id="login-btn" class="bg-white text-black font-black italic uppercase px-6 py-2 text-sm tracking-tighter hover:bg-orange-600 hover:text-white transition shadow-lg">Login</button>
            <button id="logout-btn" class="hidden text-xs text-gray-500 hover:text-white transition underline">Logout</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6">
        
        <!-- Status Panel - Always Visible but dimmed for Guests -->
        <section id="status-panel" class="mb-12 flex flex-col md:flex-row gap-8 items-center bg-[#0a0a0a] p-8 border border-[#1f1f1f] rounded-lg shadow-2xl transition-opacity duration-500">
            <div class="flex-shrink-0 text-center md:text-left">
                <p class="text-orange-600 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Standing</p>
                <h2 class="text-6xl font-black italic tracking-tighter leading-none">LVL <span id="lvl-display">1</span></h2>
                <p class="text-gray-500 font-mono mt-3 text-xs tracking-widest uppercase"><span id="rank-name" class="text-white">Novice</span></p>
            </div>
            <div class="flex-grow w-full">
                <div class="flex justify-between text-[10px] font-bold uppercase text-gray-500 mb-3 tracking-widest italic">
                    <span>XP: <span id="xp-display" class="text-white">0</span> / 1000</span>
                    <span id="percent-display">0%</span>
                </div>
                <div class="w-full bg-gray-900 h-3 rounded-full overflow-hidden border border-white/5">
                    <div id="xp-bar" class="grind-gradient h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <!-- Battle Pass Section -->
        <section class="mb-16">
            <div class="flex justify-between items-center mb-6 px-2">
                <div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter">Grind Track <span class="text-orange-600">S01</span></h3>
                    <p class="text-gray-500 text-[10px] font-bold tracking-widest mt-1">Season 01 | Mar 2026</p>
                </div>
                <div class="flex gap-2">
                    <button id="scroll-left" class="bg-white/5 p-2 px-4 border border-white/10 text-xs font-black">&larr;</button>
                    <button id="scroll-right" class="bg-white/5 p-2 px-4 border border-white/10 text-xs font-black">&rarr;</button>
                </div>
            </div>

            <div id="pass-viewport" class="no-scrollbar overflow-x-auto py-8 relative flex items-center min-h-[280px] border-y border-white/5 bg-black/40">
                <div id="pass-content" class="flex items-center px-[40vw]">
                    <!-- Injected via JS -->
                </div>
            </div>
        </section>

        <!-- Weekly Missions -->
        <section class="max-w-2xl mx-auto">
            <div class="flex flex-col gap-6 mb-10">
                <div class="flex justify-between items-end border-b border-white/10 pb-4">
                    <div>
                        <p class="text-orange-600 text-[10px] font-black uppercase tracking-widest mb-1">Operations</p>
                        <h3 class="text-3xl font-black uppercase italic tracking-tighter" id="week-title">Woche 1</h3>
                    </div>
                    <span class="text-[10px] font-black bg-orange-600 text-white px-3 py-1 italic">LIVE NOW</span>
                </div>
                
                <div class="flex flex-wrap gap-2" id="week-selector">
                    <!-- Week Buttons Injected -->
                </div>
            </div>
            
            <div id="missions-list" class="space-y-4">
                <!-- Mission Cards Injected -->
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPlRSi2R32NQAm5-DO6SU8Qftj9pGcFDs",
            authDomain: "grindappde.firebaseapp.com",
            projectId: "grindappde",
            storageBucket: "grindappde.firebasestorage.app",
            messagingSenderId: "461725243209",
            appId: "1:461725243209:web:d70693ecf6ee7a0dba6c98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const passContent = document.getElementById('pass-content');
        const missionsList = document.getElementById('missions-list');
        const weekSelector = document.getElementById('week-selector');
        const viewport = document.getElementById('pass-viewport');

        const SEASON_START = new Date('2026-03-25');
        let currentWeekTab = 1;

        const rewardData = [
            { lvl: 1, pro: 'Early Access' },
            { lvl: 2, free: 'Sticker Pack' },
            { lvl: 5, free: 'Coffee Token' },
            { lvl: 10, pro: 'S01 Hoodie' },
            { lvl: 20, pro: 'Gym Month' },
            { lvl: 30, pro: 'BLACK KEY' }
        ];

        const weeklyData = {
            1: { title: "Awakening", startOffset: 0, missions: [
                { id: 'w1m1', name: 'Midnight Run', desc: '5km zwischen 00:00 - 03:00 Uhr.', xp: 500 },
                { id: 'w1m2', name: 'Cold Start', desc: '3 Min. Eisbad Partner.', xp: 300 }
            ]},
            2: { title: "Grit", startOffset: 7, missions: [
                { id: 'w2m1', name: 'Stairway', desc: '150 Stockwerke.', xp: 600 }
            ]},
            3: { title: "Infil", startOffset: 14, missions: [
                { id: 'w3m1', name: 'The Vault', desc: 'QR Scan im Gym.', xp: 400 }
            ]},
            4: { title: "Peak", startOffset: 21, missions: [
                { id: 'w4m1', name: '180 Heart', desc: '10 Min > 170 BPM.', xp: 800 }
            ]}
        };

        function renderPass(userLvl) {
            if (!passContent) return;
            passContent.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const r = rewardData.find(x => x.lvl === i);
                const node = document.createElement('div');
                node.className = 'level-node flex flex-col items-center';
                node.id = `node-lvl-${i}`;
                const isUnlocked = i <= userLvl;
                const lineClass = i < userLvl ? 'active' : '';
                node.innerHTML = `
                    <div class="level-line ${lineClass}"></div>
                    <div class="reward-box mb-4 ${isUnlocked ? 'unlocked' : 'opacity-20 scale-90'}">
                        <span class="tag-free">FREE</span>
                        <span class="text-[9px] font-black uppercase text-center px-2 text-white">${r?.free || ''}</span>
                    </div>
                    <div class="relative z-20 w-10 h-10 rounded-full flex items-center justify-center font-black italic text-xs ${isUnlocked ? 'grind-gradient text-black scale-110 shadow-lg' : 'bg-gray-800 text-gray-500 border border-white/10'}">
                        ${i}
                    </div>
                    <div class="reward-box pro mt-4 ${isUnlocked ? 'unlocked' : 'opacity-10 scale-90'}">
                        <span class="tag-pro italic">PRO</span>
                        <span class="text-[9px] font-black uppercase text-center px-2 text-purple-400">${r?.pro || ''}</span>
                    </div>
                `;
                passContent.appendChild(node);
            }
        }

        function renderMissions() {
            if (!missionsList) return;
            const week = weeklyData[currentWeekTab];
            document.getElementById('week-title').innerText = `Woche ${currentWeekTab}: ${week.title}`;
            missionsList.innerHTML = '';
            week.missions.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card p-6 rounded-sm flex justify-between items-center group relative overflow-hidden';
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-orange-600 opacity-0 group-hover:opacity-100 transition"></div>
                    <div>
                        <h4 class="font-black italic uppercase text-lg group-hover:text-orange-600 transition tracking-tighter">${m.name}</h4>
                        <p class="text-gray-500 text-xs mt-1 font-medium">${m.desc}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <span class="block text-orange-600 font-black text-2xl italic tracking-tighter">+${m.xp}</span>
                        <button onclick="attemptVerify('${m.id}', ${m.xp})" class="mt-2 bg-white text-black px-4 py-1.5 text-[10px] font-black uppercase hover:bg-orange-600 hover:text-white transition shadow-lg">Verify</button>
                    </div>
                `;
                missionsList.appendChild(card);
            });
        }

        function renderWeekSelector() {
            if (!weekSelector) return;
            weekSelector.innerHTML = '';
            const now = new Date();
            Object.keys(weeklyData).forEach(w => {
                const weekNum = parseInt(w);
                const unlockDate = new Date(SEASON_START);
                unlockDate.setDate(unlockDate.getDate() + weeklyData[weekNum].startOffset);
                const isLocked = now < unlockDate;
                const btn = document.createElement('button');
                btn.className = `week-btn px-5 py-2 text-[10px] font-black uppercase transition rounded-sm ${currentWeekTab === weekNum ? 'active' : ''} ${isLocked ? 'week-locked' : ''}`;
                btn.innerText = `W0${weekNum}`;
                btn.onclick = () => { if (!isLocked) { currentWeekTab = weekNum; renderWeekSelector(); renderMissions(); } };
                weekSelector.appendChild(btn);
            });
        }

        function updateUI(data) {
            document.getElementById('xp-display').innerText = data.xp;
            document.getElementById('lvl-display').innerText = data.lvl;
            document.getElementById('xp-bar').style.width = ((data.xp % 1000) / 10) + "%";
            document.getElementById('percent-display').innerText = ((data.xp % 1000) / 10).toFixed(0) + "%";
            const ranks = ["Novice", "Grinder", "Hustler", "Soldier", "Ghost", "Legend"];
            document.getElementById('rank-name').innerText = ranks[Math.min(Math.floor(data.lvl / 5), ranks.length - 1)];
            renderPass(data.lvl);
            renderMissions();
            renderWeekSelector();
        }

        // Initial Render
        renderPass(1);
        renderMissions();
        renderWeekSelector();

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { xp: 0, lvl: 1, name: user.displayName });
                    updateUI({xp: 0, lvl: 1});
                } else {
                    updateUI(snap.data());
                }
            } else {
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
                updateUI({xp: 0, lvl: 1}); // Show guest mode
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('scroll-right').onclick = () => viewport.scrollBy({ left: 300, behavior: 'smooth' });
        document.getElementById('scroll-left').onclick = () => viewport.scrollBy({ left: -300, behavior: 'smooth' });

        window.attemptVerify = async (id, amount) => {
            if (!auth.currentUser) return alert("LOGIN REQUIRED");
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { xp: increment(amount) });
            const snap = await getDoc(userRef);
            const data = snap.data();
            const newLvl = Math.floor(data.xp / 1000) + 1;
            if (newLvl !== data.lvl) await updateDoc(userRef, { lvl: newLvl });
            updateUI({...data, lvl: newLvl});
        }
    </script>
</body>
</html>
