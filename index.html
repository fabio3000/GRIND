<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRIND. | Season 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=AboxAT2qskA0lY5-23Kj2tu_qY3bOK57rq_LbhtE_cdVOBT37fSHGacBKjgl-zx1XcJM9AZql96OCwc8&currency=EUR"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 0%, #1a0a00 0%, #050505 60%);
            min-height: 100vh;
            overscroll-behavior-y: none;
        }
        
        .grind-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); }
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; transition: all 0.3s ease; }
        .card:hover { border-color: #ff4d00; box-shadow: 0 0 20px rgba(255, 77, 0, 0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        
        .level-node { min-width: 140px; position: relative; }
        
        .reward-box { width: 100px; height: 85px; border: 1px solid #1f1f1f; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; border-radius: 4px; transition: all 0.3s ease; }
        .reward-box.unlocked { border-color: #ff4d00; background: #140a00; box-shadow: 0 0 15px rgba(255, 77, 0, 0.15); }
        .reward-box.pro { border-color: #6d28d9; height: 95px; width: 110px; box-shadow: 0 0 10px rgba(109, 40, 217, 0.05); }
        .reward-box.pro.unlocked { background: #1a0a2e; border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.25); }

        .tag-free { background: #333; color: white; font-size: 7px; font-weight: 900; padding: 1px 5px; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        .tag-pro { background: linear-gradient(90deg, #7c3aed, #9333ea); color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 3px; box-shadow: 0 2px 8px rgba(124,58,237,0.4); }
        
        .week-btn { border: 1px solid #1f1f1f; background: #0a0a0a; transition: all 0.2s; }
        .week-btn.active { background: #ff4d00; color: white; border-color: #ff4d00; font-weight: 900; box-shadow: 0 0 15px rgba(255, 77, 0, 0.2); }
        .week-locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; background: #0a0a0a; border: 1px solid #1f1f1f; color: white; padding: 16px 24px; border-radius: 4px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #ff4d00; }
        .toast.error { border-left: 4px solid #dc2626; }
        .toast.info { border-left: 4px solid #3b82f6; }
        
        .btn-grind { background: white; color: black; font-weight: 900; font-style: italic; text-transform: uppercase; padding: 12px 24px; font-size: 12px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.1); cursor: pointer; border-radius: 4px; border: none; }
        .btn-grind:hover { background: #ff4d00; color: white; box-shadow: 0 4px 20px rgba(255, 77, 0, 0.4); }
        .btn-grind:disabled { background: #1f1f1f; color: #555; cursor: not-allowed; box-shadow: none; border-color: #1f1f1f; }
        
        @keyframes pop { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.3) translateY(-10px); text-shadow: 0 0 30px #ff4d00; color: #ff4d00; } 
            100% { transform: scale(1) translateY(0); text-shadow: 0 0 10px rgba(255,77,0,0.5); } 
        }
        .animate-pop { animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes shine { 100% { left: 200%; } }
        .xp-bar-glow { position: relative; overflow: hidden; }
        .xp-bar-glow::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 2.5s infinite; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grecaptcha-badge { filter: invert(1) grayscale(0.2) opacity(0.3); transition: all 0.5s ease !important; bottom: 20px !important; }
        .grecaptcha-badge:hover { filter: invert(1) grayscale(0) opacity(0.8); }
		
        #intro-layer {
            position: fixed; inset: 0; z-index: 999999;
            background-color: #050505; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .word-flash {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 10vw; font-weight: 900; font-style: italic; text-transform: uppercase;
            white-space: nowrap; opacity: 0; letter-spacing: -0.05em; text-align: center;
        }
        @media (min-width: 768px) { .word-flash { font-size: 6vw; } }

        @keyframes flashInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); filter: blur(4px); }
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
            90% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); filter: blur(4px); }
        }
    </style>
</head>
<body class="flex flex-col relative select-none">

    <div id="toast-container"></div>
    <div id="recaptcha-container"></div>
    
    <div id="app" class="flex-1 flex flex-col w-full z-10 relative pb-24">
        <div class="flex-1 flex items-center justify-center min-h-[60vh]"><div class="w-16 h-16 border-t-4 border-l-4 border-[#ff4d00] rounded-full animate-spin"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };
        
        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        const SEASON_START = new Date('2026-03-25T00:00:00Z');
        const nowTime = new Date();
        const diffDays = Math.floor(Math.abs(nowTime - SEASON_START) / (1000 * 60 * 60 * 24)); 
        let dynamicWeek = Math.floor(diffDays / 7) + 1;
        if(dynamicWeek < 1) dynamicWeek = 1;
        if(dynamicWeek > 4) dynamicWeek = 4;

        let state = {
            user: null, profile: null, prevXp: null, prevLvl: null,
            bundlePrice: '19.00', view: 'loading',
            currentWeekTab: dynamicWeek,
            authStep: 'phone', tempPhone: '', tempUploadData: null,
            weeklyData: { 1: { title: "Loading...", startOffset: 0, missions: [] } },
            rewardData: [],
            myPendingProofs: []
        };

        const RANKS = ["Novice", "Grinder", "Hustler", "Soldier", "Ghost", "Legend"];

        let holdTimer = null;
        let holdProgress = 0;
        let isRedeeming = false;

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = `toast ${type}`;
            const icon = type === 'error' ? `<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` : `<svg class="w-5 h-5 text-[#ff4d00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
            toast.innerHTML = `${icon} <div><div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-0.5">System</div><div>${msg}</div></div>`;
            container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        };

        const setupSeasonData = () => {
            onSnapshot(doc(db, 'system', 'grind_season'), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.weeklyData = data.weeklyData || state.weeklyData;
                    state.rewardData = data.rewardData || [];
                }
                if(state.view === 'dashboard') render();
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.user = user;
                onSnapshot(doc(db, 'plot_users', user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        state.profile = docSnap.data();
                        if (state.view === 'loading' || state.view === 'auth' || state.view === 'onboarding') state.view = 'dashboard';
                        render();
                    } else { state.view = 'onboarding'; render(); }
                });
                
                // Fetch Pending Proofs for current user
                const pendingQuery = query(collection(db, 'plot_pending_proofs'), where('uid', '==', user.uid));
                onSnapshot(pendingQuery, (snap) => {
                    state.myPendingProofs = snap.docs.map(d => d.data().mid);
                    if(state.view === 'dashboard') render();
                });

                setupSeasonData();
                onSnapshot(doc(db, 'system', 'pricing'), (docSnap) => {
                    if (docSnap.exists()) state.bundlePrice = docSnap.data().bundlePrice; 
                    if (state.view === 'paywall') render(); 
                });
            } else { state.user = null; state.profile = null; state.view = 'auth'; state.authStep = 'phone'; render(); }
        });

        window.closeModal = () => {
            window.stopRedeemHold(); 
            const container = document.getElementById('modal-container');
            if(window.html5QrCode) { window.html5QrCode.stop().catch(e=>console.log(e)); window.html5QrCode = null; }
            if(container) { container.classList.remove('opacity-100'); container.classList.add('opacity-0', 'pointer-events-none'); setTimeout(() => container.innerHTML = '', 300); }
        };

        window.openModal = (contentHtml) => {
            let container = document.getElementById('modal-container');
            if(!container) { container = document.createElement('div'); container.id = 'modal-container'; container.className = 'fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300 overflow-y-auto'; document.body.appendChild(container); }
            container.innerHTML = `<div class="bg-[#0a0a0a] border border-[#1f1f1f] p-8 rounded-sm max-w-md w-full shadow-[0_0_40px_rgba(255,77,0,0.1)] transform scale-95 transition-transform duration-300 relative my-auto"><button onclick="window.closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white z-50"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>${contentHtml}</div>`;
            setTimeout(() => { container.classList.remove('opacity-0', 'pointer-events-none'); container.classList.add('opacity-100'); container.firstElementChild.classList.remove('scale-95'); container.firstElementChild.classList.add('scale-100'); }, 10);
        };

        // --- Proof Functions ---
        window.startQRScanner = () => {
            document.getElementById('qr-placeholder').classList.add('hidden'); document.getElementById('qr-reader').classList.remove('hidden');
            window.html5QrCode = new Html5Qrcode("qr-reader");
            window.html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 200 } }, 
            (decodedText) => { 
                document.getElementById('verify_code_input').value = decodedText; 
                try {
                    window.html5QrCode.stop().then(() => {
                        document.getElementById('qr-reader').classList.add('hidden'); 
                        window.showToast("QR Code gescannt!", "success"); 
                    }).catch(e => console.log("Scanner stop error:", e));
                } catch(e) {}
            }, 
            (err) => {}).catch(err => { window.showToast("Kamera Zugriff verweigert.", "error"); });
        };

        window.triggerFileInput = () => document.getElementById('proof_file_input').click();
        
        window.handleFileSelect = (e) => {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (ev) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); let width = img.width; let height = img.height; const MAX_SIZE = 800; if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height); const compressedData = canvas.toDataURL('image/jpeg', 0.7); document.getElementById('upload-preview').src = compressedData; document.getElementById('upload-preview').classList.remove('hidden'); document.getElementById('upload-placeholder').classList.add('hidden'); state.tempUploadData = compressedData; }; img.src = ev.target.result; }; reader.readAsDataURL(file);
        };

        window.openVerifyModal = (mid, xp, type, name) => {
            state.tempUploadData = null;
            let innerHtml = `<p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Verify Operation</p><h3 class="text-2xl font-black italic uppercase tracking-tighter mb-6">${name}</h3>`;
            if(type === 'qr') {
                innerHtml += `<div id="qr-placeholder" onclick="window.startQRScanner()" class="border-2 border-dashed border-[#1f1f1f] p-8 mb-4 flex flex-col items-center justify-center bg-black/50 rounded-sm hover:border-[#ff4d00] cursor-pointer transition"><svg class="w-12 h-12 text-[#ff4d00] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg><p class="text-xs text-white font-bold uppercase tracking-widest text-center">Kamera aktivieren</p></div><div id="qr-reader" class="hidden w-full mb-4 rounded-sm overflow-hidden border border-[#1f1f1f]"></div><input id="verify_code_input" type="text" placeholder="Oder Code manuell eingeben" class="w-full p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm outline-none focus:border-[#ff4d00] text-white text-center text-sm tracking-widest uppercase mb-6">`;
            } else {
                innerHtml += `<input type="file" id="proof_file_input" accept="image/*" class="hidden" onchange="window.handleFileSelect(event)"><div onclick="window.triggerFileInput()" class="border-2 border-dashed border-[#1f1f1f] min-h-[150px] p-2 mb-6 flex flex-col items-center justify-center bg-black/50 rounded-sm hover:border-[#ff4d00] transition cursor-pointer overflow-hidden relative"><div id="upload-placeholder" class="text-center"><svg class="w-12 h-12 text-[#ff4d00] mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg><p class="text-xs text-white font-bold uppercase tracking-widest">Beweisfoto hochladen</p></div><img id="upload-preview" class="hidden absolute inset-0 w-full h-full object-cover"></div>`;
            }
            innerHtml += `<button onclick="window.submitVerification('${mid}', ${xp}, '${type}', '${name}')" class="w-full btn-grind py-4">Senden zur Prüfung</button>`;
            window.openModal(innerHtml);
        };

        window.submitVerification = async (mid, xp, type, name) => {
            let data = null;
            if (type === 'qr') { 
                data = document.getElementById('verify_code_input').value.trim(); 
                if(!data) return window.showToast("Bitte Code eingeben oder scannen.", "error"); 
            } else { 
                data = state.tempUploadData; 
                if(!data) return window.showToast("Bitte lade ein Foto hoch.", "error"); 
            }
            
            const btn = document.querySelector('#modal-container button.btn-grind'); 
            if(btn) { btn.innerText = "Transmitting..."; btn.disabled = true; }
            
            const timeout = setTimeout(() => { 
                if(btn && btn.innerText === "Transmitting...") { 
                    btn.disabled = false; btn.innerText = "Erneut Senden"; window.showToast("Zeitüberschreitung.", "error"); 
                } 
            }, 10000);
            
            try {
                await addDoc(collection(db, 'plot_pending_proofs'), { 
                    uid: state.user.uid, 
                    alias: state.profile?.alias || 'Grinder', 
                    mid, missionName: name, xp, type, data, timestamp: new Date() 
                });
                clearTimeout(timeout); 
                window.showToast("Proof gesendet. Warte auf Bestätigung.", "info"); 
                window.closeModal();
            } catch(e) { 
                clearTimeout(timeout); window.showToast("Systemfehler beim Senden.", "error"); 
                if(btn) { btn.innerText = "Erneut Senden"; btn.disabled = false; } 
            }
        };

        // --- Ticket System (Hold to Redeem) ---
        window.startRedeemHold = (lvl, tier, event) => {
            if(isRedeeming) return;
            if(event && event.type === 'touchstart') event.preventDefault(); 

            const btn = document.getElementById('redeem-btn-fill');
            const text = document.getElementById('redeem-btn-text');
            if(!btn || !text) return;
            
            text.innerText = "HOLDING...";
            let lastTime = performance.now();

            const updateFill = (currentTime) => {
                const deltaTime = currentTime - lastTime;
                lastTime = currentTime;
                holdProgress += (deltaTime / 1500) * 100; // 1.5 Seconds

                if(holdProgress >= 100) {
                    holdProgress = 100;
                    btn.style.width = "100%";
                    window.executeRedeem(lvl, tier);
                    return;
                }
                btn.style.width = `${holdProgress}%`;
                holdTimer = requestAnimationFrame(updateFill);
            };

            holdTimer = requestAnimationFrame(updateFill);
        };

        window.stopRedeemHold = () => {
            if(isRedeeming) return;
            cancelAnimationFrame(holdTimer);
            holdProgress = 0;
            const btn = document.getElementById('redeem-btn-fill');
            const text = document.getElementById('redeem-btn-text');
            if(btn) btn.style.width = "0%";
            if(text) text.innerText = "HOLD TO REDEEM";
        };

        window.executeRedeem = async (lvl, tier) => {
            isRedeeming = true;
            const text = document.getElementById('redeem-btn-text');
            if(text) text.innerText = "VERIFYING...";
            
            const rewardId = `lvl${lvl}_${tier}`;

            try {
                const currentRedeemed = state.profile.redeemed || [];
                if(!currentRedeemed.includes(rewardId)) {
                    currentRedeemed.push(rewardId);
                    await setDoc(doc(db, 'plot_users', state.user.uid), { redeemed: currentRedeemed }, { merge: true });
                }

                const container = document.getElementById('redeem-container');
                if(container) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-6 animate-pop">
                            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(34,197,94,0.5)]">
                                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h4 class="text-white font-black italic text-xl uppercase tracking-widest text-center">Ticket<br>eingelöst</h4>
                            <p class="text-gray-400 text-xs mt-3 text-center">Dieser Loot wurde erfolgreich<br>von deinem Konto abgebucht.</p>
                        </div>
                    `;
                }
                window.showToast("Erfolgreich eingelöst!", "success");
            } catch (e) {
                window.showToast("Fehler beim Einlösen.", "error");
                window.stopRedeemHold();
            } finally {
                isRedeeming = false;
            }
        };

        // --- Dynamic Loot Redemption System ---
        window.openClaimModal = (lvl, tier) => {
            isRedeeming = false; 
            holdProgress = 0;
            
            const reward = state.rewardData.find(r => r.lvl === lvl);
            if(!reward) return;
            
            const title = reward[tier];
            const type = reward[`${tier}_type`] || 'qr';
            const info = reward[`${tier}_info`] || 'Zeige diesen Screen beim Partner vor Ort vor.';
            
            const isPro = tier === 'pro';
            const textClass = isPro ? 'text-[#a855f7]' : 'text-[#ff4d00]';
            const bgClass = isPro ? 'bg-[#a855f7]' : 'bg-[#ff4d00]';
            const borderClass = isPro ? 'border-[#a855f7]/30' : 'border-[#ff4d00]/30';

            const rewardId = `lvl${lvl}_${tier}`;
            const isAlreadyRedeemed = (state.profile.redeemed || []).includes(rewardId);

            let contentHtml = '';

            if (isAlreadyRedeemed && (type === 'qr' || type === 'shipping')) {
                contentHtml = `
                    <div class="bg-[#111] p-8 rounded-sm flex flex-col items-center justify-center mb-6 border border-white/5 shadow-inner">
                        <div class="w-12 h-12 rounded-full border-2 border-gray-600 flex items-center justify-center mb-4 opacity-50">
                            <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-xs text-gray-500 uppercase tracking-widest font-bold text-center">Bereits eingelöst<br><span class="font-normal text-[10px] mt-1 block">Dieser Loot ist nicht mehr verfügbar.</span></p>
                    </div>
                `;
            } else if (type === 'link') {
                const isUrl = info.startsWith('http');
                contentHtml = `

                            <div>${hasPremium ? '<span class="bg-[#ff4d00]/10 text-[#ff4d00] border border-[#ff4d00]/30 px-3 py-1.5 rounded-sm text-[9px] font-black uppercase tracking-widest shadow-[0_0_10px_rgba(255,77,0,0.1)]">PRO ACTIVE</span>' : '<button onclick="window.setView(\'paywall\')" class="btn-grind px-4 py-2 text-[10px]">Get Pro Pass</button>'}</div>
                        </div>

                        <div id="pass-viewport" class="no-scrollbar overflow-x-auto py-8 relative flex items-center min-h-[280px] border-y border-white/5 bg-black/40 shadow-inner">
                            <div class="flex items-center px-6 relative" style="min-width: max-content;">
                                <div class="absolute top-1/2 left-[94px] right-[94px] h-[1px] bg-[#1f1f1f] z-0 -translate-y-1/2"></div>
                                <div id="track-line" class="absolute top-1/2 left-[94px] h-[2px] bg-[#ff4d00] shadow-[0_0_10px_rgba(255,77,0,0.5)] z-0 transition-all duration-1000 ease-out -translate-y-1/2" style="width: calc(140px * ${oldTrackProgress}); display: ${safeXp > 0 || state.prevXp > 0 ? 'block' : 'none'};"></div>
            `;

            for (let i = 1; i <= 30; i++) {
                const r = state.rewardData.find(x => x.lvl === i);
                const isUnlocked = i <= safeLvl; 
                const isProUnlocked = isUnlocked && hasPremium;
                
                const freeClaimed = safeRedeemed.includes(`lvl${i}_free`);
                const proClaimed = safeRedeemed.includes(`lvl${i}_pro`);

                html += `
                    <div id="level-node-${i}" class="level-node flex flex-col items-center relative z-10">
                        <div ${isUnlocked && r?.free && !freeClaimed ? `onclick="window.openClaimModal(${i}, 'free')" class="reward-box mb-4 unlocked cursor-pointer hover:scale-105"` : (freeClaimed ? `onclick="window.openClaimModal(${i}, 'free')" class="reward-box mb-4 unlocked opacity-50 cursor-pointer"` : `class="reward-box mb-4 opacity-60 scale-95"`)}>
                            <span class="tag-free">FREE</span>
                            ${freeClaimed && r?.free ? `<span class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-[1px] text-green-500 z-20 font-black text-xs uppercase italic transform -rotate-12"><svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>` : ''}
                            <span class="text-[10px] font-bold uppercase text-center px-2 text-gray-200 mt-3">${r?.free || '-'}</span>
                        </div>
                        
                        <div id="circle-node-${i}" class="relative w-10 h-10 rounded-full flex items-center justify-center font-black italic text-xs ${isUnlocked ? 'grind-gradient text-black scale-110 shadow-[0_0_15px_rgba(255,77,0,0.5)]' : 'bg-gray-800 text-gray-400 border border-white/20'}">${i}</div>
                        
                        <div ${isProUnlocked && r?.pro && !proClaimed ? `onclick="window.openClaimModal(${i}, 'pro')" class="reward-box pro mt-5 unlocked scale-105 cursor-pointer"` : (proClaimed ? `onclick="window.openClaimModal(${i}, 'pro')" class="reward-box pro mt-5 unlocked opacity-50 cursor-pointer"` : `class="reward-box pro mt-5 opacity-70 scale-[0.98] hover:opacity-100"`)}>
                            <span class="tag-pro italic">PRO</span>
                            ${proClaimed && r?.pro ? `<span class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-[1px] text-[#a855f7] z-20 font-black text-xs uppercase italic transform -rotate-12"><svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>` : ''}
                            <span class="text-[10px] font-bold uppercase text-center px-2 mt-4 ${isProUnlocked ? 'text-[#d8b4fe]' : 'text-purple-300'}">${r?.pro || '-'}</span>
                        </div>
                    </div>
                `;
            }

            html += `
                            </div>
                        </div>
                    </section>

                    <section class="max-w-3xl mx-auto mb-12">
                        <div class="flex flex-col gap-6 mb-10">
                            <div class="flex justify-between items-end border-b border-white/10 pb-4">
                                <div><p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Operations</p><h3 class="text-3xl font-black uppercase italic tracking-tighter">${(state.weeklyData[state.currentWeekTab] || {title: 'Active'}).title}</h3></div>
                                <span class="text-[10px] font-black bg-[#ff4d00] text-white px-3 py-1 italic shadow-[0_0_10px_rgba(255,77,0,0.4)]">LIVE</span>
                            </div>
                            <div class="flex flex-wrap gap-2">
            `;

            Object.keys(state.weeklyData).forEach(w => {
                const weekNum = parseInt(w); const isLocked = weekNum > state.currentWeekTab;
                html += `<button ${isLocked ? '' : `onclick="window.setWeek(${weekNum})"`} class="week-btn px-5 py-2 text-[10px] font-black uppercase transition rounded-sm ${state.currentWeekTab === weekNum ? 'active' : ''} ${isLocked ? 'week-locked' : ''}">W0${weekNum}</button>`;
            });

            html += `</div></div><div class="space-y-4">`;

            const currentMissions = state.weeklyData[state.currentWeekTab]?.missions || [];
            if (currentMissions.length === 0) html += `<div class="text-center p-8 text-gray-600 italic text-sm">Der Director bereitet die Operations vor. Stay focused.</div>`;

            currentMissions.forEach(m => {
                const isCompleted = safeCompleted.includes(m.id);
                const isPending = !isCompleted && state.myPendingProofs.includes(m.id);
                
                html += `
                    <div class="card p-6 rounded-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group relative overflow-hidden ${isCompleted ? 'border-[#ff4d00]/30' : (isPending ? 'border-blue-500/30' : '')}">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${isCompleted ? 'bg-[#ff4d00]' : (isPending ? 'bg-blue-500' : 'bg-transparent group-hover:bg-[#ff4d00]')} transition"></div>
                        
                        <div class="absolute inset-0 bg-black/80 z-10 flex items-center justify-center backdrop-blur-[2px] opacity-0 transition-opacity ${isCompleted ? 'opacity-100 pointer-events-auto' : 'pointer-events-none'}">
                            <span class="text-[#ff4d00] font-black italic uppercase tracking-widest flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> VERIFIED</span>
                        </div>

                        <div class="absolute inset-0 bg-black/80 z-10 flex items-center justify-center backdrop-blur-[2px] opacity-0 transition-opacity ${isPending ? 'opacity-100 pointer-events-auto' : 'pointer-events-none'}">
                            <span class="text-blue-500 font-black italic uppercase tracking-widest flex items-center gap-2"><svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> PENDING REVIEW</span>
                        </div>

                        <div class="pr-6 relative z-0 flex-1" style="${isCompleted || isPending ? 'opacity: 0.3;' : ''}">
                            <h4 class="font-black italic uppercase text-lg group-hover:text-[#ff4d00] transition tracking-tighter">${m.name}</h4><p class="text-gray-400 text-xs mt-1 font-medium leading-relaxed">${m.desc}</p>
                            ${!(isCompleted || isPending) ? `<span class="inline-block mt-3 border border-gray-700 bg-black px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest text-gray-400">${m.type === 'qr' ? '📍 QR Scan' : '📷 Photo Upload'}</span>` : ''}
                        </div>
                        <div class="text-left md:text-right flex-shrink-0 relative z-0 flex flex-col items-start md:items-end w-full md:w-auto mt-4 md:mt-0" style="${isCompleted || isPending ? 'opacity: 0.3;' : ''}">
                            <span class="block text-[#ff4d00] font-black text-2xl italic tracking-tighter mb-2">+${m.xp}</span>
                            <button id="btn-${m.id}" onclick="window.openVerifyModal('${m.id}', ${m.xp}, '${m.type}', '${m.name}')" class="btn-grind w-full md:w-auto py-3 text-[10px]" ${isCompleted || isPending ? 'disabled' : ''}>Verify Operation</button>
                        </div>
                    </div>
                `;
            });

            const todayStr = new Date().toISOString().split('T')[0];
            const dailyId = `rep_usc_${todayStr}`;
            const isDailyCompleted = safeCompleted.includes(dailyId);
            const isDailyPending = !isDailyCompleted && state.myPendingProofs.includes(dailyId);

            html += `
                        </div>
                    </section>
                    
                    <section class="max-w-3xl mx-auto mb-12">
                        <div class="flex flex-col gap-6 mb-10">
                            <div class="flex justify-between items-end border-b border-white/10 pb-4">
                                <div><p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Endless Grind</p><h3 class="text-3xl font-black uppercase italic tracking-tighter">Daily Habits</h3></div>
                                <span class="text-[10px] font-black bg-gray-800 text-gray-400 px-3 py-1 italic shadow-[0_0_10px_rgba(0,0,0,0.4)]">REPEATABLE</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="card p-6 rounded-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group relative overflow-hidden ${isDailyCompleted ? 'border-[#ff4d00]/30' : (isDailyPending ? 'border-blue-500/30' : '')}">
                                <div class="absolute left-0 top-0 bottom-0 w-1 ${isDailyCompleted ? 'bg-[#ff4d00]' : (isDailyPending ? 'bg-blue-500' : 'bg-transparent group-hover:bg-[#ff4d00]')} transition"></div>
                                
                                <div class="absolute inset-0 bg-black/80 z-10 flex items-center justify-center backdrop-blur-[2px] opacity-0 transition-opacity ${isDailyCompleted ? 'opacity-100 pointer-events-auto' : 'pointer-events-none'}">
                                    <span class="text-[#ff4d00] font-black italic uppercase tracking-widest flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> VERIFIED TODAY</span>
                                </div>

                                <div class="absolute inset-0 bg-black/80 z-10 flex items-center justify-center backdrop-blur-[2px] opacity-0 transition-opacity ${isDailyPending ? 'opacity-100 pointer-events-auto' : 'pointer-events-none'}">
                                    <span class="text-blue-500 font-black italic uppercase tracking-widest flex items-center gap-2"><svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> PENDING REVIEW</span>
                                </div>

                                <div class="pr-6 relative z-0 flex-1" style="${isDailyCompleted || isDailyPending ? 'opacity: 0.3;' : ''}">
                                    <h4 class="font-black italic uppercase text-lg group-hover:text-[#ff4d00] transition tracking-tighter">Urban Sports Club</h4><p class="text-gray-400 text-xs mt-1 font-medium leading-relaxed">Lade einen Screenshot deines erfolgreichen USC Check-Ins hoch.</p><span class="inline-block mt-3 border border-gray-700 bg-black px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest text-gray-400">📷 Photo Upload</span>
                                </div>
                                <div class="text-left md:text-right flex-shrink-0 relative z-0 flex flex-col items-start md:items-end w-full md:w-auto mt-4 md:mt-0" style="${isDailyCompleted || isDailyPending ? 'opacity: 0.3;' : ''}">
                                    <span class="block text-[#ff4d00] font-black text-2xl italic tracking-tighter mb-2">+25</span><button onclick="window.openVerifyModal('${dailyId}', 25, 'upload', 'Urban Sports Check-in')" class="btn-grind w-full md:w-auto py-3 text-[10px] bg-white text-black hover:bg-[#ff4d00] hover:text-white transition" ${isDailyCompleted || isDailyPending ? 'disabled' : ''}>Verify Habit</button>
                                </div>
                            </div>
                        </div>
                    </section>
                </main>
            `;

            appDiv.innerHTML = html;

            setTimeout(() => {
                const currentNode = document.getElementById(`level-node-${safeLvl}`);
                if (currentNode && state.prevLvl === null) currentNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                const topBar = document.getElementById('top-xp-bar'); const trackLine = document.getElementById('track-line');
                if (trackLine) trackLine.style.width = `calc(140px * ${targetTrackProgress})`;

                if (state.prevLvl !== null && safeLvl > state.prevLvl) {
                    if (topBar) {
                        topBar.style.transition = 'width 1000ms ease-out'; topBar.style.width = '100%';
                        setTimeout(() => { topBar.style.transition = 'none'; topBar.style.width = '0%'; void topBar.offsetWidth; topBar.style.transition = 'width 1000ms ease-out'; topBar.style.width = `${targetXpProgress}%`; }, 1000); 
                    }
                } else if (topBar) { topBar.style.transition = 'width 1000ms ease-out'; topBar.style.width = `${targetXpProgress}%`; }

                if (state.prevXp !== null && state.prevXp < safeXp) {
                    window.scrollTo({ top: 0, behavior: 'smooth' }); animateValue('xp-counter-num', state.prevXp, safeXp, 1000);
                    if (state.prevLvl !== null && safeLvl > state.prevLvl) {
                        const lvlText = document.getElementById('main-lvl-text'); if (lvlText) lvlText.classList.add('animate-pop');
                        const newCircle = document.getElementById(`circle-node-${safeLvl}`); if (newCircle) newCircle.classList.add('animate-pop');
                        if (currentNode) currentNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }
                state.prevXp = safeXp; state.prevLvl = safeLvl;
            }, 50);
        }
    </script>
</body>
</html>
