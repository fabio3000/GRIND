<html lang="de">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PayPal & QR Scanner -->
    <script src="https://www.paypal.com/sdk/js?client-id=AboxAT2qskA0lY5-23Kj2tu_qY3bOK57rq_LbhtE_cdVOBT37fSHGacBKjgl-zx1XcJM9AZql96OCwc8&currency=EUR"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 0%, #1a0a00 0%, #050505 60%);
            min-height: 100vh;
        }
        
        /* Intro Animation Styles */
        #intro-layer {
            position: fixed; inset: 0; z-index: 999999;
            background-color: #050505;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .word-flash {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            letter-spacing: -0.05em;
            text-align: center;
        }
        @media (min-width: 768px) { .word-flash { font-size: 6vw; } }

        @keyframes flashInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); filter: blur(4px); }
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
            90% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); filter: blur(4px); }
        }

        .grind-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grind-bg-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); }
        
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; transition: all 0.3s ease; }
        .card:hover { border-color: #ff4d00; box-shadow: 0 0 20px rgba(255, 77, 0, 0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        
        .level-node { min-width: 140px; position: relative; }
        
        .reward-box { width: 100px; height: 85px; border: 1px solid #1f1f1f; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; border-radius: 4px; transition: all 0.3s ease; }
        .reward-box.unlocked { border-color: #ff4d00; background: #140a00; box-shadow: 0 0 15px rgba(255, 77, 0, 0.15); }
        .reward-box.pro { border-color: #6d28d9; height: 95px; width: 110px; box-shadow: 0 0 10px rgba(109, 40, 217, 0.05); }
        .reward-box.pro.unlocked { background: #1a0a2e; border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.25); }

        .tag-free { background: #333; color: white; font-size: 7px; font-weight: 900; padding: 1px 5px; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        .tag-pro { background: linear-gradient(90deg, #7c3aed, #9333ea); color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 3px; box-shadow: 0 2px 8px rgba(124,58,237,0.4); }
        
        .week-btn { border: 1px solid #1f1f1f; background: #0a0a0a; transition: all 0.2s; }
        .week-btn.active { background: #ff4d00; color: white; border-color: #ff4d00; font-weight: 900; box-shadow: 0 0 15px rgba(255, 77, 0, 0.2); }
        .week-locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; background: #0a0a0a; border: 1px solid #1f1f1f; color: white; padding: 16px 24px; border-radius: 4px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #ff4d00; }
        .toast.error { border-left: 4px solid #dc2626; }
        .toast.info { border-left: 4px solid #3b82f6; }
        
        .btn-grind { background: white; color: black; font-weight: 900; font-style: italic; text-transform: uppercase; padding: 12px 24px; font-size: 12px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.1); cursor: pointer; border-radius: 4px; border: none; }
        .btn-grind:hover { background: #ff4d00; color: white; box-shadow: 0 4px 20px rgba(255, 77, 0, 0.4); }
        .btn-grind:disabled { background: #1f1f1f; color: #555; cursor: not-allowed; box-shadow: none; border-color: #1f1f1f; }
        
        .completed-overlay { position: absolute; inset: 0; background: rgba(5,5,5,0.8); z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .card.is-completed .completed-overlay { opacity: 1; pointer-events: auto; }
        
        @keyframes pop { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.3) translateY(-10px); text-shadow: 0 0 30px #ff4d00; color: #ff4d00; } 
            100% { transform: scale(1) translateY(0); text-shadow: 0 0 10px rgba(255,77,0,0.5); } 
        }
        .animate-pop { animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes shine { 100% { left: 200%; } }
        .xp-bar-glow { position: relative; overflow: hidden; }
        .xp-bar-glow::after { 
            content: ''; 
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); 
            animation: shine 2.5s infinite; 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grecaptcha-badge { filter: invert(1) grayscale(0.2) opacity(0.3); transition: all 0.5s ease !important; bottom: 20px !important; }
        .grecaptcha-badge:hover { filter: invert(1) grayscale(0) opacity(0.8); }
    </style>
</head>
<body class="flex flex-col relative">

    <!-- Intro Animation Layer -->
    <div id="intro-layer">
        <div id="word1" class="word-flash text-gray-500">DISCONNECT.</div>
        <div id="word2" class="word-flash text-white">FIND YOUR TRIBE.</div>
        <div id="word3" class="word-flash text-white">PHYSICAL LIMITS.</div>
        <div id="word4" class="word-flash grind-gradient" style="text-shadow: 0 0 40px rgba(255,77,0,0.5);">GRIND.</div>

    <div id="app" class="flex-1 flex flex-col w-full z-10 relative pb-24">
        <div class="flex-1 flex items-center justify-center min-h-[60vh]"><div class="w-16 h-16 border-t-4 border-l-4 border-[#ff4d00] rounded-full animate-spin"></div></div>

    <!-- Intro Script (Fades out the overlay) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: Wenn du willst, dass es nur 1x pro Tab-Session lädt, entkommentiere dies:
            // if (sessionStorage.getItem('grindIntroSeen')) {
            //     document.getElementById('intro-layer').remove(); return;
            // }
            // sessionStorage.setItem('grindIntroSeen', 'true');

            const w1 = document.getElementById('word1');
            const w2 = document.getElementById('word2');
            const w3 = document.getElementById('word3');
            const w4 = document.getElementById('word4');
            const intro = document.getElementById('intro-layer');

            const timing = 700;
            setTimeout(() => { w1.style.animation = `flashInOut ${timing}ms forwards`; }, 200);
            setTimeout(() => { w2.style.animation = `flashInOut ${timing}ms forwards`; }, 200 + timing);
            setTimeout(() => { w3.style.animation = `flashInOut ${timing}ms forwards`; }, 200 + (timing * 2));
            setTimeout(() => { w4.style.animation = `flashInOut ${timing * 1.5}ms forwards`; }, 200 + (timing * 3));

            setTimeout(() => {
                intro.style.opacity = "0";
                setTimeout(() => intro.remove(), 800);
            }, 200 + (timing * 4.2));
        });
    </script>

    <!-- Main Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };
        
        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        const nowTime = new Date();
        let currentMonthWeekInit = Math.ceil(nowTime.getDate() / 7);
        if (currentMonthWeekInit > 4) currentMonthWeekInit = 4;

        let state = {
            user: null,
            profile: null,
            prevXp: null,
            prevLvl: null,
            bundlePrice: '19.00',
            view: 'loading',
            currentWeekTab: currentMonthWeekInit,
            authStep: 'phone',
            tempPhone: '',
            isAdmin: true, 
            pendingProofs: [],
            tempUploadData: null 
        };

        const SEASON_START = new Date('2026-03-25');
        const RANKS = ["Novice", "Grinder", "Hustler", "Soldier", "Ghost", "Legend"];

        const rewardData = [
            { lvl: 1, pro: 'Early Access Drop' },
            { lvl: 2, free: 'Free Protein Bar' },
            { lvl: 5, free: 'Partner Café Token' },
            { lvl: 10, pro: 'Heavyweight Hoodie' },
            { lvl: 15, free: 'Event Fast-Lane' },
            { lvl: 20, pro: 'Gym Month Pass' },
            { lvl: 30, pro: 'BLACK KEY' }
        ];

        let weeklyData = {
            1: { title: "Initiation", startOffset: 0, missions: [
                { id: 'w1m1', name: 'Midnight Run Club', desc: 'Check-in beim offiziellen 5K Run.', xp: 500, type: 'qr' },
                { id: 'w1m2', name: 'Protein Load', desc: 'Scan den QR-Code auf deinem Grind Protein-Riegel.', xp: 300, type: 'qr' },
                { id: 'w1m3', name: 'Early Bird', desc: 'Gym Check-in vor 06:00 Uhr. Lad ein Foto vom Rack hoch.', xp: 600, type: 'upload' }
            ]},
            2: { title: "Execution", startOffset: 7, missions: [
                { id: 'w2m1', name: 'Physical Limit', desc: 'Ein Workout bis zum Muskelversagen. (Video/Foto Upload).', xp: 600, type: 'upload' },
                { id: 'w2m2', name: 'Deep Connection', desc: 'Ein Abend ohne Screens mit Freunden. Lad ein Gruppenbild hoch.', xp: 400, type: 'upload' }
            ]},
            3: { title: "Network", startOffset: 14, missions: [
                { id: 'w3m1', name: 'Hyrox Prep', desc: 'Nimm am lokalen Hyrox-Prep Kurs teil.', xp: 800, type: 'qr' },
                { id: 'w3m2', name: 'Meal Prep', desc: 'Zeig uns dein Meal-Prep für die ganze Woche.', xp: 500, type: 'upload' }
            ]},
            4: { title: "Peak", startOffset: 21, missions: [
                { id: 'w4m1', name: '180 Heart', desc: 'Laufband oder Track: Erreiche >170 BPM. (Screenshot Smartwatch).', xp: 800, type: 'upload' },
                { id: 'w4m2', name: 'The Drop', desc: 'Sei pünktlich beim Secret Drop Event am Samstag.', xp: 1000, type: 'qr' }
            ]}
        };

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'error' 
                ? `<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : type === 'info'
                ? `<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-5 h-5 text-[#ff4d00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
            toast.innerHTML = `${icon} <div><div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-0.5">System</div><div>${msg}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        };

        const setupProfileListener = (user) => {
            try {
                const profileRef = doc(db, 'plot_users', user.uid);
                
                if(state.isAdmin) {
                    setDoc(profileRef, { isAdmin: true }, { merge: true }).catch(e=>console.log(e));
                }

                onSnapshot(profileRef, async (docSnap) => {
                    if (docSnap.exists()) {
                        state.profile = docSnap.data();
                        if (state.view === 'loading' || state.view === 'auth' || state.view === 'onboarding') {
                            state.view = 'dashboard';
                        }
                        render();
                    } else {
                        state.view = 'onboarding';
                        render();
                    }
                });

                if(state.isAdmin) {
                    onSnapshot(collection(db, 'plot_pending_proofs'), (snap) => {
                        state.pendingProofs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        if(state.view === 'admin') render();
                    });
                }
            } catch (err) {
                state.view = 'auth';
                render();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.user = user;
                setupProfileListener(user);
                
                onSnapshot(doc(db, 'system', 'pricing'), (docSnap) => {
                    if (docSnap.exists()) { 
                        state.bundlePrice = docSnap.data().bundlePrice; 
                    } else { 
                        state.bundlePrice = '19.00'; 
                        setDoc(doc(db, 'system', 'pricing'), { bundlePrice: '19.00' }); 
                    } 
                    if (state.view === 'paywall') render(); 
                });
            } else {
                state.user = null;
                state.profile = null;
                state.view = 'auth';
                state.authStep = 'phone';
                render();
            }
        });

        window.closeModal = () => {
            const container = document.getElementById('modal-container');
            if(window.html5QrCode) { window.html5QrCode.stop().catch(e=>console.log(e)); window.html5QrCode = null; }
            if(container) {
                container.classList.remove('opacity-100');
                container.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => container.innerHTML = '', 300);
            }
        };

        window.openModal = (contentHtml) => {
            let container = document.getElementById('modal-container');
            if(!container) {
                container = document.createElement('div');
                container.id = 'modal-container';
                container.className = 'fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300 overflow-y-auto';
                document.body.appendChild(container);
            }
            container.innerHTML = `
                <div class="bg-[#0a0a0a] border border-[#1f1f1f] p-8 rounded-sm max-w-md w-full shadow-[0_0_40px_rgba(255,77,0,0.1)] transform scale-95 transition-transform duration-300 relative my-auto">
                    <button onclick="window.closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white z-50"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    ${contentHtml}
                </div>
            `;
            setTimeout(() => {
                container.classList.remove('opacity-0', 'pointer-events-none');
                container.classList.add('opacity-100');
                container.firstElementChild.classList.remove('scale-95');
                container.firstElementChild.classList.add('scale-100');
            }, 10);
        };

        window.startQRScanner = () => {
            document.getElementById('qr-placeholder').classList.add('hidden');
            document.getElementById('qr-reader').classList.remove('hidden');
            window.html5QrCode = new Html5Qrcode("qr-reader");
            window.html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 200, height: 200 } },
                (decodedText) => {
                    document.getElementById('verify_code_input').value = decodedText;
                    window.html5QrCode.stop();
                    document.getElementById('qr-reader').classList.add('hidden');
                    window.showToast("QR Code gescannt!", "success");
                },
                (err) => { /* ignore */ }
            ).catch(err => {
                window.showToast("Kamera Zugriff verweigert.", "error");
            });
        };

        window.triggerFileInput = () => document.getElementById('proof_file_input').click();
        
        window.handleFileSelect = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_SIZE = 400; 
                    if (width > height && width > MAX_SIZE) {
                        height *= MAX_SIZE / width;
                        width = MAX_SIZE;
                    } else if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height;
                        height = MAX_SIZE;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.5); 
                    
                    document.getElementById('upload-preview').src = compressedData;
                    document.getElementById('upload-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    state.tempUploadData = compressedData;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.openVerifyModal = (mid, xp, type, name) => {
            state.tempUploadData = null;
            let innerHtml = `
                <p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Verify Operation</p>
                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-6">${name}</h3>
            `;

            if(type === 'qr') {
                innerHtml += `
                    <div id="qr-placeholder" onclick="window.startQRScanner()" class="border-2 border-dashed border-[#1f1f1f] p-8 mb-4 flex flex-col items-center justify-center bg-black/50 rounded-sm hover:border-[#ff4d00] cursor-pointer transition">
                        <svg class="w-12 h-12 text-[#ff4d00] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                        <p class="text-xs text-white font-bold uppercase tracking-widest text-center">Kamera aktivieren</p>
                    </div>
                    <div id="qr-reader" class="hidden w-full mb-4 rounded-sm overflow-hidden border border-[#1f1f1f]"></div>
                    <input id="verify_code_input" type="text" placeholder="Oder Code manuell eingeben" class="w-full p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm outline-none focus:border-[#ff4d00] text-white text-center text-sm tracking-widest uppercase mb-6">
                `;
            } else {
                innerHtml += `
                    <input type="file" id="proof_file_input" accept="image/*" class="hidden" onchange="window.handleFileSelect(event)">
                    <div onclick="window.triggerFileInput()" class="border-2 border-dashed border-[#1f1f1f] min-h-[150px] p-2 mb-6 flex flex-col items-center justify-center bg-black/50 rounded-sm hover:border-[#ff4d00] transition cursor-pointer overflow-hidden relative">
                        <div id="upload-placeholder" class="text-center">
                            <svg class="w-12 h-12 text-[#ff4d00] mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            <p class="text-xs text-white font-bold uppercase tracking-widest">Beweisfoto hochladen</p>
                        </div>
                        <img id="upload-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                    </div>
                `;
            }

            innerHtml += `<button onclick="window.submitVerification('${mid}', ${xp}, '${type}', '${name}')" class="w-full btn-grind py-4">Senden zur Prüfung</button>`;
            window.openModal(innerHtml);
        };

        window.submitVerification = async (mid, xp, type, name) => {
            let data = null;
            if (type === 'qr') {
                data = document.getElementById('verify_code_input').value.trim();
                if(!data) return window.showToast("Bitte Code eingeben oder scannen.", "error");
            } else {
                data = state.tempUploadData;
                if(!data) return window.showToast("Bitte lade ein Beweisfoto hoch.", "error");
            }

            const btn = document.querySelector('#modal-container button.btn-grind');
            if(btn) { btn.innerText = "Transmitting..."; btn.disabled = true; }
            
            const timeout = setTimeout(() => {
                if(btn && btn.innerText === "Transmitting...") {
                    btn.disabled = false;
                    btn.innerText = "Erneut Senden";
                    window.showToast("Zeitüberschreitung. Bitte Netzwerk prüfen.", "error");
                }
            }, 10000);

            try {
                await addDoc(collection(db, 'plot_pending_proofs'), {
                    uid: state.user.uid,
                    alias: state.profile.alias || 'Grinder',

                    const data = snap.data();
                    const isRepeatable = String(mid).startsWith('rep_');

                    if(isRepeatable || !(data.completed || []).includes(mid)) {
                        const newXp = (data.xp || 0) + xp;
                        const newCompleted = [...(data.completed || [])];
                        if(!isRepeatable) newCompleted.push(mid);

                        await setDoc(userRef, {
                            xp: newXp,
                            lvl: Math.floor(newXp / 1000) + 1,
                            completed: newCompleted
                        }, { merge: true });
                    }
                }
                await deleteDoc(doc(db, 'plot_pending_proofs', proofId));
                window.showToast("Proof akzeptiert. XP verteilt.", "success");

            const btn = document.getElementById('ai-gen-btn');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: "Generiere 3 neue Grind-Missionen zum Thema Run Club, Gym, High Protein und reale Hustle Events. Formatiere als JSON." }] }],
                    systemInstruction: { parts: [{ text: "Du bist der Operations Director einer Hardcore Fitness App. Erstelle 3 Missionen. Erlaubte Typen: 'qr' (QR scannen) oder 'upload' (Beweisfoto). XP zwischen 300 und 1000." }] },

            const canvas = document.createElement('canvas'); 
            const ctx = canvas.getContext('2d');
            
            canvas.width = 1080; 
            canvas.height = 1920; 
            const centerY = canvas.height / 2; 
            const bottomY = canvas.height;
            
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const aura = ctx.createRadialGradient(540, centerY, 0, 540, centerY, 800);
            aura.addColorStop(0, 'rgba(255, 77, 0, 0.15)'); 
            aura.addColorStop(1, 'transparent');
            ctx.fillStyle = aura; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalAlpha = 0.05;
            for (let i = 0; i < 50000; i++) { 
                ctx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000'; 
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2); 
            }
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'italic 900 120px "Inter", sans-serif'; 
            ctx.textAlign = 'center'; 
            ctx.fillText('GRIND.', 540, canvas.height * 0.15); 
            ctx.fillStyle = '#ff4d00';
            ctx.fillText('.', 540 + (ctx.measureText('GRIND').width / 2) + 15, canvas.height * 0.15);

            const userAlias = state.profile.alias || 'Stranger';
            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'italic 900 80px "Inter", sans-serif';
            ctx.fillText(userAlias.toUpperCase(), 540, centerY - 80);

            const safeLvl = state.profile.lvl || 1;
            const safeXp = state.profile.xp || 0;
            const completedCount = state.profile.completed?.length || 0;
            const currentRank = RANKS[Math.min(Math.floor((safeLvl - 1) / 5), RANKS.length - 1)];
            
            ctx.fillStyle = '#ff4d00'; 
            ctx.font = '900 70px "Inter", sans-serif'; 
            ctx.letterSpacing = "5px"; 
            ctx.fillText(`LVL ${safeLvl} • ${currentRank.toUpperCase()}`, 540, centerY + 30);

            const barWidth = 800;
            const barHeight = 15;
            const startX = 540 - (barWidth / 2);
            const barY = centerY + 100;
            
            ctx.fillStyle = '#1f1f1f';
            ctx.fillRect(startX, barY, barWidth, barHeight);
            
            const xpProgress = (safeXp % 1000) / 1000;
            ctx.fillStyle = '#ff4d00';
            ctx.fillRect(startX, barY, barWidth * xpProgress, barHeight);

            ctx.fillStyle = '#666666'; 
            ctx.letterSpacing = "3px"; 
            ctx.font = '700 25px "Inter", sans-serif'; 
            ctx.fillText(`XP: ${safeXp} / ${safeLvl * 1000}  •  ${completedCount} OPERATIONS CLEARED`, 540, barY + 60);
            
            ctx.fillStyle = '#444444';
            ctx.font = '400 24px "Inter", sans-serif'; 
            ctx.fillText(`SEASON 01 • ACTIVE`, 540, bottomY - 120);

            let fileName = `GRIND_S01_${userAlias.replace(/\s+/g, '')}.png`; 
            let shareText = `My standing in the Grind. Level ${safeLvl}.`;

            canvas.toBlob(async (blob) => {
                if (!blob) return window.showToast("Fehler bei der Bildgenerierung.", "error");
                const file = new File([blob], fileName, { type: 'image/png' });
                const downloadFallback = () => { 
                    const link = document.createElement('a'); 
                    link.download = fileName; 
                    link.href = canvas.toDataURL('image/png'); 
                    link.click(); 
                    window.showToast("Status exportiert.", "success"); 
                };
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) { 
                    try { 
                        await navigator.share({ files: [file], title: 'GRIND.', text: shareText }); 
                    } catch (err) { 
                        if (err.name !== 'AbortError') downloadFallback(); 
                    } 
                } else { 
                    downloadFallback(); 
                }
            }, 'image/png');
        };

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end;
                }
            };
            window.requestAnimationFrame(step);
        }

                                            </div>
                                            <div class="flex gap-2">
                                                <button onclick="window.rejectProof('${p.id}')" class="w-8 h-8 rounded-sm bg-red-900/30 hover:bg-red-600 border border-red-900/50 text-white flex items-center justify-center transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                                <button onclick="window.acceptProof('${p.id}', '${p.uid}', '${p.mid}', ${p.xp})" class="w-8 h-8 rounded-sm bg-green-900/30 hover:bg-[#ff4d00] border border-green-900/50 text-white flex items-center justify-center transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </main>`;
                appDiv.innerHTML = html;
                return;
            }

            const p = state.profile || { xp: 0, lvl: 1, completed: [], alias: 'Stranger', hasPremium: false };
            const safeXp = p.xp || 0;
            const safeLvl = p.lvl || 1;
            const safeCompleted = p.completed || [];
            const hasPremium = p.hasPremium || false;

            const currentRank = RANKS[Math.min(Math.floor((safeLvl - 1) / 5), RANKS.length - 1)];

            const now = new Date();
            let currentMonthWeek = Math.ceil(now.getDate() / 7);
            if (currentMonthWeek > 4) currentMonthWeek = 4;

            const displayXp = state.prevXp !== null ? state.prevXp : safeXp;
            const targetXpProgress = (safeXp % 1000) / 10;
            const oldXpProgress = state.prevXp !== null ? (state.prevXp % 1000) / 10 : targetXpProgress;

            const targetTrackProgress = Math.min(29, safeLvl - 1 + (safeXp % 1000) / 1000);
            const oldTrackProgress = state.prevXp !== null ? Math.min(29, (state.prevLvl || 1) - 1 + (state.prevXp % 1000) / 1000) : targetTrackProgress;

            let html = `
                <header class="p-6 max-w-6xl mx-auto flex justify-between items-center w-full relative z-20">
                    <h1 class="text-3xl font-black italic tracking-tighter">GRIND<span class="text-[#ff4d00]">.</span></h1>
                    <div class="flex gap-3">
                        ${state.isAdmin ? `<button onclick="window.setView('admin')" class="text-[10px] uppercase font-bold text-[#ff4d00] hover:text-white transition tracking-widest border border-[#ff4d00]/30 hover:border-[#ff4d00] px-3 py-1 rounded-sm bg-[#ff4d00]/10">Command Center</button>` : ''}
                        <button onclick="window.generateShareCard()" class="text-[10px] uppercase font-bold text-gray-400 hover:text-white transition tracking-widest border border-gray-800 hover:border-[#ff4d00] px-3 py-1 rounded-sm bg-[#0a0a0a]">Export</button>
                        <button onclick="window.handleLogout()" class="text-[10px] uppercase font-bold text-gray-500 hover:text-red-500 transition tracking-widest border border-gray-800 px-3 py-1 rounded-sm bg-[#0a0a0a]">Exit</button>
                    </div>
                </header>

                <main class="max-w-6xl mx-auto px-6 w-full relative z-10 pb-20">
                    
                    <section class="mb-12 flex flex-col md:flex-row gap-8 items-center bg-[#0a0a0a] p-8 border border-[#1f1f1f] rounded-lg shadow-2xl relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-r from-[#ff4d00] to-transparent opacity-0 group-hover:opacity-5 transition duration-1000"></div>
                        <div class="flex-shrink-0 text-center md:text-left relative z-10">
                            <p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-[0.4em] mb-2">Standing</p>
                            <h2 id="main-lvl-text" class="text-6xl font-black italic tracking-tighter leading-none inline-block">LVL ${safeLvl}</h2>
                            <p class="text-gray-500 font-mono mt-3 text-xs tracking-widest uppercase"><span class="text-white">${currentRank}</span></p>
                            <p class="text-gray-600 font-bold italic mt-1 text-[10px] uppercase tracking-widest">${p.alias}</p>
                        </div>
                        <div class="flex-grow w-full relative z-10">
                            <div class="flex justify-between text-[10px] font-bold uppercase text-gray-500 mb-3 tracking-widest italic">
                                <span>XP: <span class="text-white" id="xp-counter-num">${displayXp}</span> / ${(safeLvl) * 1000}</span>
                            </div>
                            <div class="w-full bg-gray-900 h-3 rounded-full overflow-hidden border border-white/5 relative">
                                <div id="top-xp-bar" class="grind-gradient h-full transition-all duration-1000 ease-out xp-bar-glow" style="width: ${oldXpProgress}%"></div>
                            </div>
                        </div>
                    </section>

                    <section class="mb-16">
                        <div class="flex justify-between items-center mb-6 px-2">
                            <div>
                                <h3 class="text-2xl font-black italic uppercase tracking-tighter">Grind Track <span class="text-[#ff4d00]">S01</span></h3>
                                <p class="text-gray-500 text-[10px] font-bold tracking-widest mt-1">Season 01 | Active</p>
                            </div>
                            <div>
                                ${hasPremium 
                                    ? '<span class="bg-[#ff4d00]/10 text-[#ff4d00] border border-[#ff4d00]/30 px-3 py-1.5 rounded-sm text-[9px] font-black uppercase tracking-widest shadow-[0_0_10px_rgba(255,77,0,0.1)]">PRO ACTIVE</span>'
                                    : '<button onclick="window.setView(\'paywall\')" class="btn-grind px-4 py-2 text-[10px]">Get Pro Pass</button>'
                                }
                            </div>
                        </div>

                        <div id="pass-viewport" class="no-scrollbar overflow-x-auto py-8 relative flex items-center min-h-[280px] border-y border-white/5 bg-black/40 shadow-inner">
                            <div class="flex items-center px-6 relative" style="min-width: max-content;">
                                <div class="absolute top-1/2 left-[94px] right-[94px] h-[1px] bg-[#1f1f1f] z-0 -translate-y-1/2"></div>
                                <div id="track-line" class="absolute top-1/2 left-[94px] h-[2px] bg-[#ff4d00] shadow-[0_0_10px_rgba(255,77,0,0.5)] z-0 transition-all duration-1000 ease-out -translate-y-1/2" style="width: calc(140px * ${oldTrackProgress}); display: ${safeXp > 0 || state.prevXp > 0 ? 'block' : 'none'};"></div>
            `;

            for (let i = 1; i <= 30; i++) {
                const r = rewardData.find(x => x.lvl === i);
                const isUnlocked = i <= safeLvl;
                const isProUnlocked = isUnlocked && hasPremium;

                html += `
                    <div id="level-node-${i}" class="level-node flex flex-col items-center relative z-10">
                        <div ${isUnlocked && r?.free ? `onclick="window.openClaimModal('${r.free}', false)" class="reward-box mb-4 unlocked cursor-pointer hover:scale-105"` : `class="reward-box mb-4 opacity-60 scale-95"`}>
                            <span class="tag-free">FREE</span>
                            <span class="text-[10px] font-bold uppercase text-center px-2 text-gray-200">${r?.free || '-'}</span>
                        </div>
                        <div id="circle-node-${i}" class="relative w-10 h-10 rounded-full flex items-center justify-center font-black italic text-xs ${isUnlocked ? 'grind-gradient text-black scale-110 shadow-[0_0_15px_rgba(255,77,0,0.5)]' : 'bg-gray-800 text-gray-400 border border-white/20'}">
                            ${i}
                        </div>
                        <div ${isProUnlocked && r?.pro ? `onclick="window.openClaimModal('${r.pro}', true)" class="reward-box pro mt-5 unlocked scale-105 cursor-pointer"` : `class="reward-box pro mt-5 opacity-70 scale-[0.98] hover:opacity-100"`}>
                            <span class="tag-pro italic">PRO</span>
                            <span class="text-[10px] font-bold uppercase text-center px-2 ${isProUnlocked ? 'text-[#d8b4fe]' : 'text-purple-300'}">${r?.pro || '-'}</span>
                        </div>
                    </div>
                `;
            }

            html += `
                            </div>
                        </div>
                    </section>

                    <section class="max-w-3xl mx-auto mb-12">
                        <div class="flex flex-col gap-6 mb-10">
                            <div class="flex justify-between items-end border-b border-white/10 pb-4">
                                <div>
                                    <p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Operations</p>
                                    <h3 class="text-3xl font-black uppercase italic tracking-tighter">Woche ${state.currentWeekTab}: ${weeklyData[state.currentWeekTab].title}</h3>
                                </div>
                                <span class="text-[10px] font-black bg-[#ff4d00] text-white px-3 py-1 italic shadow-[0_0_10px_rgba(255,77,0,0.4)]">LIVE</span>
                            </div>
                            
                            <div class="flex flex-wrap gap-2">
            `;

            Object.keys(weeklyData).forEach(w => {
                const weekNum = parseInt(w);
                const isLocked = weekNum > currentMonthWeek;
                html += `<button ${isLocked ? '' : `onclick="window.setWeek(${weekNum})"`} class="week-btn px-5 py-2 text-[10px] font-black uppercase transition rounded-sm ${state.currentWeekTab === weekNum ? 'active' : ''} ${isLocked ? 'week-locked' : ''}">W0${weekNum}</button>`;
            });

            html += `
                            </div>
                        </div>
                        <div class="space-y-4">
            `;

            weeklyData[state.currentWeekTab].missions.forEach(m => {
                const isCompleted = safeCompleted.includes(m.id);
                
                html += `
                    <div class="card p-6 rounded-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group relative overflow-hidden ${isCompleted ? 'is-completed border-[#ff4d00]/30' : ''}">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-[#ff4d00] opacity-0 group-hover:opacity-100 transition"></div>
                        
                        <div class="completed-overlay">
                            <span class="text-[#ff4d00] font-black italic uppercase tracking-widest flex items-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Verified
                            </span>
                        </div>

                        <div class="pr-6 relative z-0 flex-1">
                            <h4 class="font-black italic uppercase text-lg group-hover:text-[#ff4d00] transition tracking-tighter">${m.name}</h4>
                            <p class="text-gray-400 text-xs mt-1 font-medium leading-relaxed">${m.desc}</p>
                            ${!isCompleted ? `<span class="inline-block mt-3 border border-gray-700 bg-black px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest text-gray-400">${m.type === 'qr' ? '📍 QR Scan' : '📷 Photo Upload'}</span>` : ''}
                        </div>
                        <div class="text-left md:text-right flex-shrink-0 relative z-0 flex flex-col items-start md:items-end w-full md:w-auto mt-4 md:mt-0">
                            <span class="block text-[#ff4d00] font-black text-2xl italic tracking-tighter mb-2">+${m.xp}</span>
                            <button id="btn-${m.id}" onclick="window.openVerifyModal('${m.id}', ${m.xp}, '${m.type}', '${m.name}')" class="btn-grind w-full md:w-auto py-3 text-[10px]" ${isCompleted ? 'disabled' : ''}>
                                Verify Operation
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </section>
                    
                    <section class="max-w-3xl mx-auto mb-12">
                        <div class="flex flex-col gap-6 mb-10">
                            <div class="flex justify-between items-end border-b border-white/10 pb-4">
                                <div>
                                    <p class="text-[#ff4d00] text-[10px] font-black uppercase tracking-widest mb-1">Endless Grind</p>
                                    <h3 class="text-3xl font-black uppercase italic tracking-tighter">Daily Habits</h3>
                                </div>
                                <span class="text-[10px] font-black bg-gray-800 text-gray-400 px-3 py-1 italic shadow-[0_0_10px_rgba(0,0,0,0.4)]">REPEATABLE</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            
                            <div class="card p-6 rounded-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-600 group-hover:bg-[#ff4d00] transition"></div>

                                <div class="pr-6 relative z-0 flex-1">
                                    <h4 class="font-black italic uppercase text-lg group-hover:text-[#ff4d00] transition tracking-tighter">Urban Sports Club</h4>
                                    <p class="text-gray-400 text-xs mt-1 font-medium leading-relaxed">Lade einen Screenshot deines erfolgreichen USC Check-Ins hoch.</p>
                                    <span class="inline-block mt-3 border border-gray-700 bg-black px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest text-gray-400">📷 Photo Upload</span>
                                </div>
                                <div class="text-left md:text-right flex-shrink-0 relative z-0 flex flex-col items-start md:items-end w-full md:w-auto mt-4 md:mt-0">
                                    <span class="block text-[#ff4d00] font-black text-2xl italic tracking-tighter mb-2">+25</span>
                                    <button onclick="window.openVerifyModal('rep_usc', 25, 'upload', 'Urban Sports Check-in')" class="btn-grind w-full md:w-auto py-3 text-[10px] bg-white text-black hover:bg-[#ff4d00] hover:text-white transition">
                                        Verify Habit
                                    </button>
                                </div>
                            </div>
                            
                        </div>
                    </section>

                </main>
            `;

            appDiv.innerHTML = html;

            setTimeout(() => {
                const currentNode = document.getElementById(`level-node-${safeLvl}`);
                if (currentNode && state.prevLvl === null) {
                    currentNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }

                const topBar = document.getElementById('top-xp-bar');
                const trackLine = document.getElementById('track-line');
                
                if (trackLine) trackLine.style.width = `calc(140px * ${targetTrackProgress})`;

                if (state.prevLvl !== null && safeLvl > state.prevLvl) {
                    if (topBar) {
                        topBar.style.transition = 'width 1000ms ease-out';
                        topBar.style.width = '100%';
                        setTimeout(() => {
                            topBar.style.transition = 'none';
                            topBar.style.width = '0%';
                            void topBar.offsetWidth; 
                            topBar.style.transition = 'width 1000ms ease-out';
                            topBar.style.width = `${targetXpProgress}%`;
                        }, 1000); 
                    }
                } else {
                    if (topBar) {
                        topBar.style.transition = 'width 1000ms ease-out';
                        topBar.style.width = `${targetXpProgress}%`;
                    }
                }

                if (state.prevXp !== null && state.prevXp < safeXp) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                    animateValue('xp-counter-num', state.prevXp, safeXp, 1000);
                    
                    if (state.prevLvl !== null && safeLvl > state.prevLvl) {
                        const lvlText = document.getElementById('main-lvl-text');
                        if (lvlText) lvlText.classList.add('animate-pop');
                        
                        const newCircle = document.getElementById(`circle-node-${safeLvl}`);
                        if (newCircle) newCircle.classList.add('animate-pop');
                        
                        if (currentNode) currentNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }

                state.prevXp = safeXp;
                state.prevLvl = safeLvl;
            }, 50);
        }
    </script>
</body>
</html>
