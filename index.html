<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIND. | Season 01 Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .grind-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); }
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; transition: all 0.3s ease; }
        .card:hover { border-color: #ff4d00; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        
        .level-node { min-width: 140px; position: relative; }
        .level-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #1f1f1f; z-index: 0; }
        .level-line.active { background: #ff4d00; height: 2px; }
        
        .reward-box { width: 100px; height: 85px; border: 1px solid #1f1f1f; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; transition: all 0.3s; cursor: pointer; border-radius: 4px; }
        .reward-box.unlocked { border-color: #ff4d00; background: #140a00; box-shadow: 0 0 15px rgba(255, 77, 0, 0.1); }
        .reward-box.pro { border-color: #4c1d95; }
        .reward-box.pro.unlocked { background: #1a0a2e; border-color: #7c3aed; box-shadow: 0 0 15px rgba(124, 58, 237, 0.1); }

        .tag-free { background: #333; color: white; font-size: 7px; font-weight: 900; padding: 1px 5px; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        .tag-pro { background: #7c3aed; color: white; font-size: 7px; font-weight: 900; padding: 1px 5px; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); text-transform: uppercase; border-radius: 2px; }
        
        .week-btn.active { background: #ff4d00; color: white; border-color: #ff4d00; }
        .week-locked { opacity: 0.4; cursor: not-allowed; position: relative; }
        .week-locked::after { content: 'LOCKED'; position: absolute; top: -10px; right: -5px; font-size: 6px; background: #ff0000; color: white; padding: 1px 3px; border-radius: 2px; font-weight: 900; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-4xl font-black italic tracking-tighter">GRIND<span class="text-orange-600">.</span></h1>
        <div id="auth-controls">
            <button id="login-btn" class="bg-white text-black font-black italic uppercase px-6 py-2 text-sm tracking-tighter hover:bg-orange-600 hover:text-white transition">Join the Grind</button>
            <button id="logout-btn" class="hidden text-xs text-gray-500 hover:text-white transition underline">Exit System</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6">
        
        <!-- Large Status Panel (Requested Style) -->
        <section id="status-panel" class="hidden mb-12 flex flex-col md:flex-row gap-10 items-center bg-[#0a0a0a] p-10 border border-[#1f1f1f] rounded-lg shadow-2xl">
            <div class="flex-shrink-0 text-center md:text-left">
                <p class="text-orange-600 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Standing in Society</p>
                <h2 class="text-7xl font-black italic tracking-tighter leading-none">LVL <span id="lvl-display">1</span></h2>
                <p class="text-gray-500 font-mono mt-4 text-sm tracking-widest uppercase">Rank: <span id="rank-name" class="text-white">Novice</span></p>
            </div>
            <div class="flex-grow w-full">
                <div class="flex justify-between text-[10px] font-bold uppercase text-gray-500 mb-3 tracking-widest italic">
                    <span>Experience Points: <span id="xp-display" class="text-white">0</span> / 1000</span>
                    <span id="percent-display">0%</span>
                </div>
                <div class="w-full bg-gray-900 h-4 rounded-full overflow-hidden border border-white/5 p-[2px]">
                    <div id="xp-bar" class="grind-gradient h-full transition-all duration-1000 shadow-[0_0_20px_rgba(255,77,0,0.4)]" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <!-- Battle Pass (Sleek Horizontal) -->
        <section class="mb-16">
            <div class="flex justify-between items-center mb-6 px-2">
                <div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter">Grind Track <span class="text-orange-600">S01</span></h3>
                    <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mt-1">Unlock rewards by reaching levels</p>
                </div>
                <div class="flex gap-2">
                    <button id="scroll-left" class="bg-white/5 p-2 px-4 border border-white/10 text-xs font-black">&larr;</button>
                    <button id="scroll-right" class="bg-white/5 p-2 px-4 border border-white/10 text-xs font-black">&rarr;</button>
                </div>
            </div>

            <div id="pass-viewport" class="no-scrollbar overflow-x-auto py-8 relative flex items-center min-h-[300px] border-y border-white/5">
                <div id="pass-content" class="flex items-center px-[40vw]">
                    <!-- Injected via JS -->
                </div>
            </div>
        </section>

        <!-- Weekly Missions -->
        <section class="max-w-2xl mx-auto">
            <div class="flex flex-col gap-6 mb-10">
                <div class="flex justify-between items-end border-b border-white/10 pb-4">
                    <div>
                        <p class="text-orange-600 text-[10px] font-black uppercase tracking-widest mb-1">Weekly Operations</p>
                        <h3 class="text-3xl font-black uppercase italic tracking-tighter" id="week-title">Woche 1</h3>
                    </div>
                    <span class="text-[10px] font-black bg-orange-600 text-white px-3 py-1 italic shadow-lg shadow-orange-600/20">LIVE NOW</span>
                </div>
                
                <!-- Week Selector with Lock Logic -->
                <div class="flex flex-wrap gap-3" id="week-selector">
                    <!-- Buttons Injected via JS to check dates -->
                </div>
            </div>
            
            <div id="missions-list" class="space-y-4">
                <!-- Mission Cards Injected -->
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPlRSi2R32NQAm5-DO6SU8Qftj9pGcFDs",
            authDomain: "grindappde.firebaseapp.com",
            projectId: "grindappde",
            storageBucket: "grindappde.firebasestorage.app",
            messagingSenderId: "461725243209",
            appId: "1:461725243209:web:d70693ecf6ee7a0dba6c98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const statusPanel = document.getElementById('status-panel');
        const passContent = document.getElementById('pass-content');
        const viewport = document.getElementById('pass-viewport');

        // SEASON CONFIG (Adjust start date to lock/unlock weeks)
        const SEASON_START = new Date('2024-05-20'); // Beispiel Startdatum

        // MASSIVE REWARDS LIST
        const levels = [];
        const rewardNames = [
            { lvl: 1, pro: 'Early Access' },
            { lvl: 2, free: 'Grind Sticker Pack' },
            { lvl: 3, pro: 'Premium Profile' },
            { lvl: 5, free: 'Free Coffee Token' },
            { lvl: 7, pro: 'Performance Socks' },
            { lvl: 10, pro: 'Season 01 Hoodie', free: '10% Shop Code' },
            { lvl: 12, free: 'Digital Badge' },
            { lvl: 15, free: 'Partner Guest Pass', pro: 'Grind Shaker' },
            { lvl: 18, pro: 'Exclusive Workout' },
            { lvl: 20, pro: '1 Month Gym Access' },
            { lvl: 25, free: 'Secret Event Invite' },
            { lvl: 30, pro: 'THE BLACK KEY' }
        ];

        for(let i=1; i<=30; i++) {
            const r = rewardNames.find(x => x.lvl === i);
            levels.push({
                lvl: i,
                free: r?.free || (i % 5 === 0 ? 'XP Boost' : null),
                pro: r?.pro || (i % 2 === 0 ? 'Custom Badge' : null)
            });
        }

        const weeklyData = {
            1: { title: "The Awakening", startOffset: 0, missions: [
                { id: 'w1m1', name: 'Midnight Run', desc: '5km zwischen 00:00 - 03:00 Uhr.', xp: 500 },
                { id: 'w1m2', name: 'Cold Start', desc: '3 Min. Eisbad bei Partner.', xp: 300 },
                { id: 'w1m3', name: 'Ghost Step', desc: '15.000 Schritte an einem Tag.', xp: 400 }
            ]},
            2: { title: "Pure Grit", startOffset: 7, missions: [
                { id: 'w2m1', name: 'Stairway to Hell', desc: '150 Stockwerke in 24h.', xp: 600 },
                { id: 'w2m2', name: 'High-Speed KM', desc: '1km unter 4:15 Min.', xp: 500 },
                { id: 'w2m3', name: 'Burpee Hell', desc: '100 Burpees am Stück.', xp: 500 }
            ]},
            3: { title: "Infiltration", startOffset: 14, missions: [
                { id: 'w3m1', name: 'The Vault', desc: 'QR-Code Scan im Gym-Safe.', xp: 400 },
                { id: 'w3m2', name: 'Rooftop Infil', desc: 'QR-Code auf Parkhaus-Dach.', xp: 600 },
                { id: 'w3m3', name: 'Night Owl', desc: '4h Smartphone-Abstinenz ab 22 Uhr.', xp: 400 }
            ]},
            4: { title: "The Peak", startOffset: 21, missions: [
                { id: 'w4m1', name: '180 Heartbeat', desc: 'Puls 10 Min. > 170 BPM.', xp: 800 },
                { id: 'w4m2', name: 'Vertical Mile', desc: '1.000 Höhenmeter in 7 Tagen.', xp: 1200 },
                { id: 'w4m3', name: 'Final Marathon', desc: '25km Lauf Gesamtdistanz.', xp: 1500 }
            ]}
        };

        let currentWeekTab = 1;

        // AUTH & SYNC
        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                statusPanel.classList.remove('hidden');
                await syncUser(user);
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                statusPanel.classList.add('hidden');
                renderUIForGuest();
            }
        });

        async function syncUser(user) {
            const userRef = doc(db, "users", user.uid);
            let snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { xp: 0, lvl: 1, name: user.displayName });
                snap = await getDoc(userRef);
            }
            updateUI(snap.data());
        }

        function updateUI(data) {
            document.getElementById('xp-display').innerText = data.xp;
            document.getElementById('lvl-display').innerText = data.lvl;
            
            // Rank logic
            const ranks = ["Novice", "Grinder", "Hustler", "Soldier", "Ghost", "Legend"];
            document.getElementById('rank-name').innerText = ranks[Math.min(Math.floor(data.lvl / 5), ranks.length - 1)];

            const progress = (data.xp % 1000) / 10;
            document.getElementById('xp-bar').style.width = progress + "%";
            document.getElementById('percent-display').innerText = progress.toFixed(0) + "%";

            renderPass(data.lvl);
            renderWeekSelector();
            renderMissions();
            setTimeout(() => scrollToLevel(data.lvl), 400);
        }

        function renderUIForGuest() {
            renderPass(1);
            renderWeekSelector();
            renderMissions();
        }

        function renderPass(userLvl) {
            passContent.innerHTML = '';
            levels.forEach((l) => {
                const node = document.createElement('div');
                node.className = 'level-node flex flex-col items-center';
                node.id = `node-lvl-${l.lvl}`;
                const isUnlocked = l.lvl <= userLvl;
                const lineClass = l.lvl < userLvl ? 'active' : '';

                node.innerHTML = `
                    <div class="level-line ${lineClass}"></div>
                    <div class="reward-box mb-4 ${isUnlocked ? 'unlocked' : 'opacity-20 scale-90'}">
                        <span class="tag-free">FREE</span>
                        <span class="text-[9px] font-black uppercase text-center px-2 leading-none text-white">${l.free || ''}</span>
                    </div>
                    <div class="relative z-20 w-10 h-10 rounded-full flex items-center justify-center font-black italic text-xs ${isUnlocked ? 'grind-gradient text-black scale-110' : 'bg-gray-800 text-gray-500 border border-white/10'} shadow-lg">
                        ${l.lvl}
                    </div>
                    <div class="reward-box pro mt-4 ${isUnlocked ? 'unlocked' : 'opacity-10 scale-90'}">
                        <span class="tag-pro italic">PRO TRACK</span>
                        <span class="text-[9px] font-black uppercase text-center px-2 text-purple-400 leading-none">${l.pro || ''}</span>
                    </div>
                `;
                passContent.appendChild(node);
            });
        }

        function renderWeekSelector() {
            const container = document.getElementById('week-selector');
            container.innerHTML = '';
            const now = new Date();

            Object.keys(weeklyData).forEach(w => {
                const weekNum = parseInt(w);
                const unlockDate = new Date(SEASON_START);
                unlockDate.setDate(unlockDate.getDate() + weeklyData[weekNum].startOffset);
                const isLocked = now < unlockDate;

                const btn = document.createElement('button');
                btn.className = `week-btn px-5 py-2 text-[10px] font-black uppercase border border-white/10 transition rounded-sm ${currentWeekTab === weekNum ? 'active' : ''} ${isLocked ? 'week-locked' : ''}`;
                btn.innerText = `Week 0${weekNum}`;
                btn.onclick = () => {
                    if (!isLocked) {
                        currentWeekTab = weekNum;
                        renderWeekSelector();
                        renderMissions();
                    }
                };
                container.appendChild(btn);
            });
        }

        function renderMissions() {
            const list = document.getElementById('missions-list');
            const week = weeklyData[currentWeekTab];
            document.getElementById('week-title').innerText = `Woche ${currentWeekTab}: ${week.title}`;
            list.innerHTML = '';
            
            week.missions.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card p-6 rounded-sm flex justify-between items-center group relative overflow-hidden';
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-orange-600 opacity-0 group-hover:opacity-100 transition"></div>
                    <div>
                        <h4 class="font-black italic uppercase text-lg group-hover:text-orange-600 transition tracking-tighter">${m.name}</h4>
                        <p class="text-gray-500 text-xs mt-1 leading-relaxed font-medium">${m.desc}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <span class="block text-orange-600 font-black text-2xl italic tracking-tighter">+${m.xp}</span>
                        <button onclick="attemptVerify('${m.id}', ${m.xp})" class="mt-2 bg-white text-black px-4 py-1.5 text-[10px] font-black uppercase hover:bg-orange-600 hover:text-white transition shadow-lg">Verify</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function scrollToLevel(lvl) {
            const target = document.getElementById(`node-lvl-${lvl}`);
            if (target) {
                const offset = target.offsetLeft - (viewport.offsetWidth / 2) + (target.offsetWidth / 2);
                viewport.scrollTo({ left: offset, behavior: 'smooth' });
            }
        }

        document.getElementById('scroll-right').onclick = () => viewport.scrollBy({ left: 300, behavior: 'smooth' });
        document.getElementById('scroll-left').onclick = () => viewport.scrollBy({ left: -300, behavior: 'smooth' });

        window.attemptVerify = async (id, amount) => {
            if (!auth.currentUser) return alert("ACCESS DENIED. LOGIN REQUIRED.");
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { xp: increment(amount) });
            const snap = await getDoc(userRef);
            const data = snap.data();
            const newLvl = Math.floor(data.xp / 1000) + 1;
            if (newLvl !== data.lvl) await updateDoc(userRef, { lvl: newLvl });
            updateUI({...data, lvl: newLvl});
        }
    </script>
</body>
</html>
