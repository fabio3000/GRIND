<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tomodachi Insel Drama</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f8ff;
            --ui-white: #ffffff;
            --text-dark: #4a4a4a;
            --tomo-green: #90ee90;
            --tomo-green-dark: #32cd32;
            --tomo-orange: #ffa07a;
            --tomo-blue: #87cefa;
            --border-radius: 25px;
            --shadow: 0 6px 0px rgba(0,0,0,0.1);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Varela Round', sans-serif; 
            user-select: none; 
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle, #ffffff 20%, transparent 20%), radial-gradient(circle, #ffffff 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-dark);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: var(--ui-white);
            padding: 15px;
            text-align: center;
            font-size: 1.8rem;
            color: #ff69b4;
            border-bottom: 5px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .controls {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;
            border-bottom: 2px solid #eee; z-index: 10;
        }

        input[type="text"], select, .btn {
            padding: 10px 18px;
            border-radius: var(--border-radius);
            border: 3px solid #eee;
            font-size: 1rem;
            outline: none;
            background: white;
            color: var(--text-dark);
            font-weight: bold;
            transition: all 0.1s;
        }

        input[type="text"]:focus, select:focus { border-color: var(--tomo-blue); }

        .btn {
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            border: none;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.1); }

        .btn-green { background: var(--tomo-green); color: #006400; }
        .btn-blue { background: var(--tomo-blue); color: #00008b; }
        .btn-orange { background: var(--tomo-orange); color: #8b0000; }

        .btn-blue.active { background: #ff4757; color: white; animation: pulse 1s infinite; }

        /* Versteckter File Input */
        input[type="file"] { display: none; }
        .upload-lbl {
            background: #fff3e0; border: 3px dashed #ffb74d; color: #e65100;
            padding: 8px 15px; border-radius: var(--border-radius); cursor: pointer; font-weight: bold;
        }
        .upload-lbl.has-file { background: #e8f5e9; border-color: #81c784; color: #2e7d32; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .canvas-container { flex-grow: 1; position: relative; width: 100%; }
        canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
        canvas:active { cursor: grabbing; }

    </style>
</head>
<body>

    <header>🏝️ Insel der Dramen 🏝️</header>

    <div class="controls">
        <label class="upload-lbl" id="uploadLabel">
            📷 Mii-Bild
            <input type="file" id="miiImage" accept="image/*">
        </label>
        
        <input type="text" id="charName" placeholder="Name (z.B. Bob)">
        <button class="btn btn-green" id="addCharBtn">➕ Hinzufügen</button>
        
        <div style="width: 2px; height: 30px; background: #ccc; margin: 0 10px;"></div>
        
        <select id="relType">
            <option value="love">💖 Verliebt</option>
            <option value="hate">🌩️ Feinde</option>
            <option value="ex">💔 Ex-Partner</option>
            <option value="bestie">👯 Besties</option>
        </select>
        <button class="btn btn-blue" id="connectBtn">🔗 Verbinden</button>
        
        <div style="width: 2px; height: 30px; background: #ccc; margin: 0 10px;"></div>
        
        <button class="btn btn-orange" id="exportBtn">🎬 Filmposter generieren!</button>
    </div>

    <div class="canvas-container">
        <canvas id="dramaCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('dramaCanvas');
        const ctx = canvas.getContext('2d');
        let dpr = window.devicePixelRatio || 1;
        
        function resize() {
            canvas.width = canvas.parentElement.clientWidth * dpr;
            canvas.height = canvas.parentElement.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }
        window.addEventListener('resize', resize);

        let nodes = [];
        let edges = [];
        let isDragging = false, draggedNode = null;
        let isConnectingMode = false, connectStartNode = null;
        let currentImageObj = null;

        const relColors = {
            love:   { color: '#ff4757', dash: [], label: '💖 Liebe' },
            hate:   { color: '#3742fa', dash: [10, 5], label: '🌩️ Feind' },
            ex:     { color: '#747d8c', dash: [5, 10], label: '💔 Ex' },
            bestie: { color: '#ffa502', dash: [], label: '👯 Bestie' }
        };

        // --- BILD UPLOAD LOGIK ---
        const imageInput = document.getElementById('miiImage');
        const uploadLabel = document.getElementById('uploadLabel');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImageObj = img;
                        uploadLabel.classList.add('has-file');
                        uploadLabel.innerHTML = '✅ Bild bereit';
                        // Das <input> wieder anfügen, da innerHTML es überschreibt
                        uploadLabel.appendChild(imageInput);
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // --- KNOTEN HINZUFÜGEN ---
        document.getElementById('addCharBtn').addEventListener('click', () => {
            const name = document.getElementById('charName').value.trim() || "Unbekannt";
            
            nodes.push({
                id: Date.now(),
                name: name,
                x: Math.random() * (canvas.width/dpr - 150) + 75,
                y: Math.random() * (canvas.height/dpr - 150) + 75,
                radius: 50,
                img: currentImageObj,
                color: `hsl(${Math.random() * 360}, 80%, 75%)` // Fallback Farbe
            });

            // Reset
            document.getElementById('charName').value = '';
            currentImageObj = null;
            uploadLabel.classList.remove('has-file');
            uploadLabel.innerHTML = '📷 Mii-Bild';
            uploadLabel.appendChild(imageInput);
            
            draw();
        });

        // --- VERBINDEN ---
        const connectBtn = document.getElementById('connectBtn');
        connectBtn.addEventListener('click', () => {
            isConnectingMode = !isConnectingMode;
            connectStartNode = null;
            connectBtn.classList.toggle('active');
            connectBtn.textContent = isConnectingMode ? '❌ Abbrechen' : '🔗 Verbinden';
            draw();
        });

        // --- MOVEMENT & INTERAKTION ---
        let lastClickTime = 0;
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            const clickedNode = nodes.find(n => Math.hypot(n.x - pos.x, n.y - pos.y) <= n.radius);

            // Doppelklick zum Löschen
            if (clickedNode && (Date.now() - lastClickTime < 300)) {
                edges = edges.filter(ed => ed.source !== clickedNode && ed.target !== clickedNode);
                nodes = nodes.filter(n => n !== clickedNode);
                connectStartNode = null;
                draw();
                return;
            }
            lastClickTime = Date.now();

            if (isConnectingMode) {
                if (clickedNode) {
                    if (!connectStartNode) connectStartNode = clickedNode;
                    else if (connectStartNode !== clickedNode) {
                        edges.push({
                            source: connectStartNode,
                            target: clickedNode,
                            type: document.getElementById('relType').value
                        });
                        connectStartNode = null;
                        isConnectingMode = false;
                        connectBtn.classList.remove('active');
                        connectBtn.textContent = '🔗 Verbinden';
                    }
                }
            } else if (clickedNode) {
                isDragging = true;
                draggedNode = clickedNode;
                canvas.setPointerCapture(e.pointerId);
            }
            draw();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (isDragging && draggedNode) {
                const rect = canvas.getBoundingClientRect();
                draggedNode.x = e.clientX - rect.left;
                draggedNode.y = e.clientY - rect.top;
                draw();
            }
        });

        canvas.addEventListener('pointerup', (e) => {
            isDragging = false;
            draggedNode = null;
            canvas.releasePointerCapture(e.pointerId);
        });

        // --- HAUPT-ZEICHNEN ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);

            // Linien
            edges.forEach(edge => {
                const style = relColors[edge.type];
                ctx.beginPath();
                ctx.moveTo(edge.source.x, edge.source.y);
                ctx.lineTo(edge.target.x, edge.target.y);
                ctx.strokeStyle = style.color;
                ctx.lineWidth = 5;
                ctx.setLineDash(style.dash);
                ctx.stroke();

                // Beziehungs-Label auf der Linie
                const midX = (edge.source.x + edge.target.x) / 2;
                const midY = (edge.source.y + edge.target.y) / 2;
                ctx.font = 'bold 14px "Varela Round"';
                ctx.setLineDash([]);
                const txtW = ctx.measureText(style.label).width;
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.roundRect(midX - txtW/2 - 10, midY - 12, txtW + 20, 24, 12); ctx.fill();
                ctx.strokeStyle = style.color; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = style.color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(style.label, midX, midY);
            });
            ctx.setLineDash([]);

            // Auswahlring
            if (connectStartNode) {
                ctx.beginPath();
                ctx.arc(connectStartNode.x, connectStartNode.y, connectStartNode.radius + 10, 0, Math.PI*2);
                ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 4; ctx.setLineDash([5, 5]); ctx.stroke();
                ctx.setLineDash([]);
            }

            // Knoten/Miis
            nodes.forEach(node => {
                ctx.save();
                
                // Sticker Schatten
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 4;

                // Äußerer weißer Sticker-Rand
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI*2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                ctx.shadowColor = 'transparent'; // Schatten aus für inneren Inhalt

                // Bild oder Fallback-Farbe in den Kreis zeichnen
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius - 2, 0, Math.PI*2);
                ctx.clip(); // Ab hier wird alles kreisförmig abgeschnitten

                if (node.img) {
                    // Bild zentriert und skaliert füllen
                    const size = node.radius * 2;
                    ctx.drawImage(node.img, node.x - node.radius, node.y - node.radius, size, size);
                } else {
                    ctx.fillStyle = node.color;
                    ctx.fill();
                }
                ctx.restore(); // Clipping beenden

                // Name als kleines Schildchen darunter
                ctx.font = 'bold 14px "Varela Round"';
                const nWidth = ctx.measureText(node.name).width;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(node.x - nWidth/2 - 8, node.y + node.radius - 5, nWidth + 16, 22, 10);
                ctx.fill();
                ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.stroke();
                
                ctx.fillStyle = '#333';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.name, node.x, node.y + node.radius + 6);
            });
        }

        // --- STAR WARS / KINO PLAKAT EXPORT ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            if(nodes.length === 0) {
                alert("Du brauchst mindestens einen Mii für ein Poster!");
                return;
            }

            const pCanvas = document.createElement('canvas');
            const pCtx = pCanvas.getContext('2d');
            pCanvas.width = 800;
            pCanvas.height = 1200; // Typisches Poster Format

            // 1. Epischer Weltraum-Hintergrund
            const grad = pCtx.createRadialGradient(400, 600, 0, 400, 600, 800);
            grad.addColorStop(0, '#1B1464'); // Tiefes Dunkelblau
            grad.addColorStop(1, '#000000');
            pCtx.fillStyle = grad;
            pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);

            // Sterne
            for(let i=0; i<150; i++) {
                pCtx.fillStyle = `rgba(255,255,255,${Math.random()})`;
                pCtx.beginPath();
                pCtx.arc(Math.random()*800, Math.random()*1200, Math.random()*2, 0, Math.PI*2);
                pCtx.fill();
            }

            // 2. Dramatische Strahlen aus der Mitte
            pCtx.save();
            pCtx.translate(400, 600);
            for(let i=0; i<12; i++) {
                pCtx.rotate(Math.PI / 6);
                pCtx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                pCtx.beginPath();
                pCtx.moveTo(0, 0);
                pCtx.lineTo(1000, 200);
                pCtx.lineTo(1000, -200);
                pCtx.fill();
            }
            pCtx.restore();

            // 3. Miis hierarchisch zeichnen (wie ein Filmplakat)
            // Sortiere nach Anzahl der Beziehungen, der "Hauptcharakter" kommt zuletzt (wird ganz oben gezeichnet)
            let nodeScores = nodes.map(n => {
                let score = edges.filter(e => e.source === n || e.target === n).length;
                return { node: n, score: score };
            }).sort((a,b) => a.score - b.score);

            const total = nodeScores.length;
            
            nodeScores.forEach((item, index) => {
                const isMain = (index === total - 1); // Der Letzte ist der Hauptcharakter
                
                // Positionen wie in einer Pyramide
                let px, py, radius;
                if (isMain) {
                    px = 400; py = 450; radius = 200; // Riesig in der Mitte
                } else {
                    // Verteile die anderen um den Hauptcharakter herum
                    const angle = Math.PI + (index / (total-1 || 1)) * Math.PI; // Halbkreis unten
                    const distance = 350 + (Math.random() * 50);
                    px = 400 + Math.cos(angle) * distance;
                    py = 500 + Math.sin(angle) * 300;
                    radius = 90 + Math.random() * 30; // Verschieden groß
                }

                pCtx.save();
                
                // Episches Glühen um die Miis
                pCtx.shadowColor = isMain ? '#ff9f43' : '#5f27cd';
                pCtx.shadowBlur = isMain ? 50 : 20;
                
                pCtx.beginPath();
                pCtx.arc(px, py, radius, 0, Math.PI*2);
                pCtx.fillStyle = '#fff';
                pCtx.fill();
                pCtx.lineWidth = isMain ? 10 : 5;
                pCtx.strokeStyle = '#fff';
                pCtx.stroke();
                pCtx.shadowColor = 'transparent';

                // Clipping für Bild
                pCtx.beginPath();
                pCtx.arc(px, py, radius - 2, 0, Math.PI*2);
                pCtx.clip();
                
                if(item.node.img) {
                    pCtx.drawImage(item.node.img, px - radius, py - radius, radius*2, radius*2);
                } else {
                    pCtx.fillStyle = item.node.color;
                    pCtx.fill();
                }
                
                // Dramatischer Schattenverlauf von unten auf dem Mii
                const overlay = pCtx.createLinearGradient(0, py - radius, 0, py + radius);
                overlay.addColorStop(0, 'rgba(0,0,0,0)');
                overlay.addColorStop(1, 'rgba(0,0,0,0.6)');
                pCtx.fillStyle = overlay;
                pCtx.fill();

                pCtx.restore();

                // Name in Film-Schriftart
                pCtx.fillStyle = '#fff';
                pCtx.font = `bold ${isMain ? 40 : 25}px Arial`;
                pCtx.textAlign = 'center';
                pCtx.shadowColor = '#000';
                pCtx.shadowBlur = 10;
                pCtx.fillText(item.node.name.toUpperCase(), px, py + radius + (isMain ? 40 : 30));
                pCtx.shadowBlur = 0;
            });

            // 4. Dramatischer Titel
            pCtx.fillStyle = '#feca57'; // Gold-Gelb
            pCtx.font = 'bold 80px "Varela Round", sans-serif';
            pCtx.textAlign = 'center';
            pCtx.shadowColor = '#ee5253';
            pCtx.shadowBlur = 20;
            pCtx.shadowOffsetY = 5;
            pCtx.fillText("INSEL DER DRAMEN", 400, 150);
            
            pCtx.fillStyle = '#fff';
            pCtx.font = 'bold 30px "Varela Round", sans-serif';
            pCtx.letterSpacing = '10px'; // Workaround: manuelles Spacing ist schwer, wir machen es einfach bold
            pCtx.fillText("EPISODE I: DIE EX SCHLÄGT ZURÜCK", 400, 210);

            // Credits unten
            pCtx.fillStyle = '#8395a7';
            pCtx.font = '20px Arial';
            pCtx.fillText(`Mit ${nodes.length} verrückten Inselbewohnern und ${edges.length} krassen Beziehungsdramen.`, 400, 1150);

            // Download anstoßen
            const link = document.createElement('a');
            link.download = `Drama_Poster_${Date.now()}.png`;
            link.href = pCanvas.toDataURL('image/png');
            link.click();
        });

        setTimeout(resize, 100);
    </script>
</body>
</html>
