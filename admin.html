<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRIND. | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            min-height: 100vh;
        }
        
        .grind-gradient { background: linear-gradient(90deg, #ff4d00, #ff8800); }
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; background: #0a0a0a; border: 1px solid #1f1f1f; color: white; padding: 16px 24px; border-radius: 4px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #ff4d00; }
        .toast.error { border-left: 4px solid #dc2626; }
        .toast.info { border-left: 4px solid #3b82f6; }
        
        .btn-grind { background: white; color: black; font-weight: 900; font-style: italic; text-transform: uppercase; padding: 12px 24px; font-size: 12px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.1); cursor: pointer; border-radius: 4px; border: none; }
        .btn-grind:hover { background: #ff4d00; color: white; box-shadow: 0 4px 20px rgba(255, 77, 0, 0.4); }
        .btn-grind:disabled { background: #1f1f1f; color: #555; cursor: not-allowed; box-shadow: none; border-color: #1f1f1f; }
        
        .admin-tab { padding: 12px 24px; font-size: 10px; text-transform: uppercase; font-weight: 900; letter-spacing: 0.1em; border-bottom: 2px solid transparent; color: #666; cursor: pointer; transition: all 0.3s; }
        .admin-tab.active { color: #ff4d00; border-bottom-color: #ff4d00; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #050505; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #ff4d00; }
    </style>
</head>
<body class="flex flex-col relative">

    <div id="toast-container"></div>
    <div id="recaptcha-container"></div>
    
    <div id="app" class="flex-1 flex flex-col w-full z-10 relative pb-24">
        <div class="flex-1 flex items-center justify-center min-h-[60vh]"><div class="w-16 h-16 border-t-4 border-l-4 border-[#ff4d00] rounded-full animate-spin"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };
        
        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        const SEASON_START = new Date('2026-03-25T00:00:00Z');
        const nowTime = new Date();
        const diffDays = Math.floor(Math.abs(nowTime - SEASON_START) / (1000 * 60 * 60 * 24)); 
        let dynamicWeek = Math.floor(diffDays / 7) + 1;
        if(dynamicWeek < 1) dynamicWeek = 1;
        if(dynamicWeek > 4) dynamicWeek = 4;

        let state = {
            user: null, profile: null, view: 'loading',
            authStep: 'phone', tempPhone: '',
            adminTab: 'control', adminEditWeek: dynamicWeek, 
            pendingProofs: [], weeklyData: {}, rewardData: []
        };

        let isSubscribed = false;

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = `toast ${type}`;
            const icon = type === 'error' ? `<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` : `<svg class="w-5 h-5 text-[#ff4d00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
            toast.innerHTML = `${icon} <div><div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-0.5">System</div><div>${msg}</div></div>`;
            container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        };

        function safeRender() {
            const active = document.activeElement;
            const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
            if (!isTyping) {
                render();
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.user = user;
                onSnapshot(doc(db, 'plot_users', user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const profile = docSnap.data();
                        if (profile.isAdmin) {
                            state.profile = profile; 
                            state.view = 'admin';
                            
                            if(!isSubscribed) {
                                isSubscribed = true;
                                
                                onSnapshot(doc(db, 'system', 'grind_season'), (sSnap) => {
                                    if (sSnap.exists()) {
                                        const data = sSnap.data();
                                        state.weeklyData = data.weeklyData || {}; 
                                        state.rewardData = data.rewardData || [];
                                        if(state.view === 'admin' && state.adminTab === 'control') {
                                            window.renderMissions();
                                            window.renderRewards();
                                        }
                                    } else {
                                        setDoc(doc(db, 'system', 'grind_season'), { weeklyData: {}, rewardData: [] }, { merge: true });
                                    }
                                });

                                onSnapshot(collection(db, 'plot_pending_proofs'), (pSnap) => {
                                    state.pendingProofs = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
                                    if(state.view === 'admin' && state.adminTab === 'proofs') safeRender();
                                });
                            }
                            safeRender();
                        } else { state.view = 'denied'; render(); }
                    } else { state.view = 'onboarding'; render(); }
                });
            } else { state.user = null; state.profile = null; state.view = 'auth'; state.authStep = 'phone'; render(); }
        });

        window.submitOnboarding = async (e) => {
            e.preventDefault(); 
            const nameInput = document.getElementById('onboard_name').value.trim();
            const cityInput = document.getElementById('onboard_city').value;
            
            if(!nameInput) return window.showToast("Bitte gib einen Namen ein.", "error");

            const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "Registering...";
            try {
                // Hier in admin.html wird isAdmin auf true gesetzt!
                state.profile = { xp: 0, lvl: 1, completed: [], redeemed: [], alias: nameInput, city: cityInput, hasPremium: false, isAdmin: true };
                await setDoc(doc(db, 'plot_users', state.user.uid), state.profile);
                window.showToast(`Admin Zugang gewährt, ${nameInput}.`, "success");
            } catch (err) { window.showToast("Fehler bei der Registrierung.", "error"); btn.disabled = false; btn.innerText = "Confirm Identity"; }
        };

        window.setAdminTab = (tab) => { state.adminTab = tab; render(); };
        window.setAdminEditWeek = (week) => { state.adminEditWeek = week; window.renderMissions(); };
        window.handleLogout = () => { state.view = 'loading'; render(); signOut(auth); };

        // --- Proof Management ---
        window.acceptProof = async (proofId, uid, mid, xp) => {
            try {
                const userRef = doc(db, 'plot_users', uid); const snap = await getDoc(userRef);
                if(snap.exists()) {
                    const data = snap.data(); const isRepeatable = String(mid).startsWith('rep_');
                    if(isRepeatable || !(data.completed || []).includes(mid)) {
                        const newXp = (data.xp || 0) + xp; const newCompleted = [...(data.completed || [])];
                        if(!isRepeatable) newCompleted.push(mid);
                        await setDoc(userRef, { xp: newXp, lvl: Math.floor(newXp / 1000) + 1, completed: newCompleted }, { merge: true });
                    }
                }
                await deleteDoc(doc(db, 'plot_pending_proofs', proofId));
                window.showToast("Proof akzeptiert. XP verteilt.", "success");
            } catch(e) { window.showToast("Fehler bei Akzeptanz.", "error"); }
        };

        window.rejectProof = async (proofId) => {
            try { await deleteDoc(doc(db, 'plot_pending_proofs', proofId)); window.showToast("Proof gelöscht.", "info"); } catch(e) { window.showToast("Fehler bei Ablehnung.", "error"); }
        };

        window.aiCheckProof = async (proofId, missionName, type, base64SafeString) => {
            const apiKey = localStorage.getItem('gemini_api_key') || '';
            if(!apiKey) return window.showToast("Bitte API Key im Control Tab eintragen.", "error");
            
            const btn = document.getElementById(`ai_btn_${proofId}`);
            const resDiv = document.getElementById(`ai_res_${proofId}`);
            if(btn) btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            
            try {
                const data = decodeURIComponent(atob(base64SafeString));
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                let contents = [];

                if (type === 'upload') {
                    const base64Data = data.split(',')[1];
                    const mimeType = data.split(';')[0].split(':')[1];
                    contents = [{ parts: [ { text: `Prüfe dieses Beweisfoto für die Fitness-Mission: "${missionName}". Ist das ein authentischer Beweis für diese Herausforderung? Antworte kurz mit "JA:" oder "NEIN:" und einem Satz Begründung.` }, { inlineData: { mimeType: mimeType, data: base64Data } } ] }];
                } else {
                    contents = [{ parts: [{ text: `Macht der eingereichte QR/Barcode "${data}" Sinn für die Aufgabe "${missionName}"? Antworte kurz mit JA oder NEIN und Begründung.` }] }];
                }

                const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents }) });
                if (!res.ok) throw new Error("API Fetch failed");
                const resData = await res.json();
                const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;

                if(text) {
                    resDiv.innerHTML = `<span class="font-bold">🤖 KI Coach:</span> ${text}`;
                    resDiv.classList.remove('hidden');
                }
            } catch (err) { window.showToast("KI Analyse fehlgeschlagen.", "error"); } 
            finally { if(btn) btn.innerHTML = `🤖`; }
        };

        // --- Mission Control ---
        window.renderMissions = () => {
            const container = document.getElementById('mission_list_container');
            if(!container) return;
            const currentWeekData = state.weeklyData[state.adminEditWeek] || { missions: [] };
            
            if((currentWeekData.missions || []).length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-600 italic">Keine Missionen in dieser Woche.</p>';
                return;
            }

            container.innerHTML = currentWeekData.missions.map(m => `
                <div class="bg-[#050505] p-3 border border-white/10 rounded-sm flex justify-between items-start">
                    <div>
                        <div class="font-black italic uppercase text-sm">${m.name}</div>
                        <div class="text-[9px] text-[#ff4d00] font-bold uppercase tracking-widest mt-1">${m.xp} XP | ${m.type}</div>
                    </div>
                    <button type="button" onclick="window.deleteMission(${state.adminEditWeek}, '${m.id}')" class="text-gray-600 hover:text-red-500 transition ml-4"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </div>
            `).join('');
        };

        window.addManualMission = async () => {
            const name = document.getElementById('new_mis_name').value.trim();
            const desc = document.getElementById('new_mis_desc').value.trim();
            const xp = document.getElementById('new_mis_xp').value;
            const type = document.getElementById('new_mis_type').value;

            if(!name || !desc || !xp) return window.showToast("Bitte alle Felder ausfüllen.", "error");

            const newMission = { id: 'm_' + Date.now(), name: name, desc: desc, xp: parseInt(xp), type: type };

            const updatedWeekly = JSON.parse(JSON.stringify(state.weeklyData));
            if(!updatedWeekly[state.adminEditWeek]) updatedWeekly[state.adminEditWeek] = { title: "Woche " + state.adminEditWeek, missions: [] };
            if(!updatedWeekly[state.adminEditWeek].missions) updatedWeekly[state.adminEditWeek].missions = [];
            updatedWeekly[state.adminEditWeek].missions.push(newMission);
            
            try {
                await setDoc(doc(db, 'system', 'grind_season'), { weeklyData: updatedWeekly }, { merge: true });
                window.showToast("Operation live geschaltet.", "success");
                document.getElementById('new_mis_name').value = ''; document.getElementById('new_mis_desc').value = ''; document.getElementById('new_mis_xp').value = '';
            } catch(err) { window.showToast("Fehler beim Speichern. (Rechte prüfen!)", "error"); }
        };

        window.deleteMission = async (week, missionId) => {
            if(!confirm("Operation wirklich löschen?")) return;
            const updatedWeekly = JSON.parse(JSON.stringify(state.weeklyData));
            updatedWeekly[week].missions = updatedWeekly[week].missions.filter(m => m.id !== missionId);
            await setDoc(doc(db, 'system', 'grind_season'), { weeklyData: updatedWeekly }, { merge: true });
            window.showToast("Operation entfernt.", "success");
        };

        // --- AI Mission Generator ---
        window.saveApiKey = (e) => { localStorage.setItem('gemini_api_key', e.target.value); };

        window.generateAIQuests = async () => {
            const apiKey = localStorage.getItem('gemini_api_key') || ''; 
            if(!apiKey) return window.showToast("Bitte API Key eintragen.", "error");
            
            const btn = document.getElementById('ai-gen-btn'); 
            const resultBox = document.getElementById('ai-result');
            btn.innerText = "Processing System Data..."; btn.disabled = true;
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = { 
                    contents: [{ parts: [{ text: "Generiere 3 neue Grind-Missionen zum Thema Run Club, Gesundheit (Eisbaden, Nutrition) und echte Connections (Deep Talks). Formatiere exakt als JSON." }] }], 
                    systemInstruction: { parts: [{ text: "Du bist der Operations Director einer Health & Hustle App. Erstelle 3 Missionen. Typen: 'qr' oder 'upload'. XP zwischen 300 und 1000." }] }, 
                    generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { missions: { type: "ARRAY", items: { type: "OBJECT", properties: { name: {type: "STRING"}, desc: {type: "STRING"}, xp: {type: "INTEGER"}, type: {type: "STRING"} } } } } } } 
                };
                
                const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error("API Fetch failed");
                const data = await res.json(); 
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if(text) {
                    resultBox.innerHTML = JSON.parse(text).missions.map(m => {
                        const safeString = btoa(encodeURIComponent(JSON.stringify(m)));
                        return `
                        <div class="bg-black/50 p-3 mb-2 border border-white/10 rounded-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-black italic uppercase text-sm">${m.name}</span>
                                <span class="text-[#ff4d00] text-[10px] font-bold">+${m.xp} XP | ${m.type.toUpperCase()}</span>
                            </div>
                            <p class="text-xs text-gray-500 mb-3">${m.desc}</p>
                            <button type="button" onclick="window.acceptAiMission('${safeString}')" class="w-full bg-[#ff4d00]/20 hover:bg-[#ff4d00]/40 text-[#ff4d00] border border-[#ff4d00]/30 py-2 rounded-sm text-[10px] font-bold uppercase tracking-widest transition">+ Add to Week ${state.adminEditWeek}</button>
                        </div>`;
                    }).join('');
                    window.showToast("KI hat Operations entworfen.", "success");
                }
            } catch (err) { window.showToast("KI Fehler: Key prüfen.", "error"); } 
            finally { btn.innerText = "KI: Generiere Ops"; btn.disabled = false; }
        };

        window.acceptAiMission = async (base64String) => {
            const mission = JSON.parse(decodeURIComponent(atob(base64String))); mission.id = 'ai_' + Date.now();
            const updatedWeekly = JSON.parse(JSON.stringify(state.weeklyData));
            if(!updatedWeekly[state.adminEditWeek]) updatedWeekly[state.adminEditWeek] = { title: "Woche " + state.adminEditWeek, missions: [] };
            if(!updatedWeekly[state.adminEditWeek].missions) updatedWeekly[state.adminEditWeek].missions = [];
            updatedWeekly[state.adminEditWeek].missions.push(mission);
            
            await setDoc(doc(db, 'system', 'grind_season'), { weeklyData: updatedWeekly }, { merge: true });
            window.showToast("KI Operation zur Season hinzugefügt!", "success");
            document.getElementById('ai-result').innerHTML = '<p class="text-[10px] text-gray-600 uppercase font-bold text-center italic mt-6">Warte auf Input...</p>';
        };

        // --- Visual Reward Editor ---
        window.renderRewards = () => {
            const container = document.getElementById('reward_list_container');
            if(!container) return;
            
            if(state.rewardData.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-600 italic">Keine Rewards konfiguriert.</p>';
                return;
            }

            container.innerHTML = state.rewardData.sort((a,b)=>a.lvl-b.lvl).map(r => `
                ${r.free ? `
                <div class="bg-[#050505] p-2 border border-white/5 rounded-sm flex justify-between items-center">
                    <div><span class="bg-gray-800 text-white px-1.5 py-0.5 rounded-sm text-[8px] font-black mr-2">LVL ${r.lvl}</span><span class="bg-[#ff4d00]/20 text-[#ff4d00] px-1.5 py-0.5 rounded-sm text-[8px] font-black mr-2 uppercase">FREE</span><span class="text-xs text-gray-300">${r.free}</span></div>
                    <button type="button" onclick="window.deleteReward(${r.lvl}, 'free')" class="text-gray-600 hover:text-red-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>` : ''}
                ${r.pro ? `
                <div class="bg-[#050505] p-2 border border-white/5 rounded-sm flex justify-between items-center">
                    <div><span class="bg-gray-800 text-white px-1.5 py-0.5 rounded-sm text-[8px] font-black mr-2">LVL ${r.lvl}</span><span class="bg-[#a855f7]/20 text-[#a855f7] px-1.5 py-0.5 rounded-sm text-[8px] font-black mr-2 uppercase">PRO</span><span class="text-xs text-gray-300">${r.pro}</span></div>
                    <button type="button" onclick="window.deleteReward(${r.lvl}, 'pro')" class="text-gray-600 hover:text-red-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>` : ''}
            `).join('');
        };

        window.addReward = async () => {
            const lvlInput = document.getElementById('rew_lvl').value;
            const title = document.getElementById('rew_title').value.trim();
            const info = document.getElementById('rew_info').value.trim();
            
            if(!lvlInput || !title || !info) return window.showToast("Bitte alle Felder ausfüllen.", "error");

            const lvl = parseInt(lvlInput);
            const tier = document.getElementById('rew_tier').value;
            const type = document.getElementById('rew_type').value;

            let updatedRewards = JSON.parse(JSON.stringify(state.rewardData));
            let existing = updatedRewards.find(r => r.lvl === lvl);

            if (!existing) { existing = { lvl: lvl }; updatedRewards.push(existing); }
            existing[tier] = title; existing[`${tier}_type`] = type; existing[`${tier}_info`] = info;
            updatedRewards.sort((a, b) => a.lvl - b.lvl);

            try {
                await setDoc(doc(db, 'system', 'grind_season'), { rewardData: updatedRewards }, { merge: true });
                window.showToast(`Level ${lvl} Reward gespeichert.`, "success");
                document.getElementById('rew_lvl').value = ''; document.getElementById('rew_title').value = ''; document.getElementById('rew_info').value = '';
            } catch (err) { window.showToast("Fehler beim Speichern.", "error"); }
        };

        window.deleteReward = async (lvl, tier) => {
            if(!confirm(`Reward für Level ${lvl} (${tier.toUpperCase()}) löschen?`)) return;
            let updatedRewards = JSON.parse(JSON.stringify(state.rewardData));
            let existing = updatedRewards.find(r => r.lvl === lvl);
            if(existing) {
                delete existing[tier]; delete existing[`${tier}_type`]; delete existing[`${tier}_info`];
                if(!existing.free && !existing.pro) updatedRewards = updatedRewards.filter(r => r.lvl !== lvl);
                await setDoc(doc(db, 'system', 'grind_season'), { rewardData: updatedRewards }, { merge: true });
                window.showToast("Reward entfernt.", "success");
            }
        };

        window.updateRewardInfoPlaceholder = (val) => {
            const input = document.getElementById('rew_info');
            if(val === 'link') input.placeholder = "URL eintragen (z.B. https://hyrox.com/discount)";
            else if(val === 'shipping') input.placeholder = "Versand-Anweisung (z.B. Schick uns deine Größe)";
            else input.placeholder = "Einlöse-Anweisung (z.B. Zeige dies an der Kasse)";
        };

        // --- Auth SMS ---
        window.sendSMS = async () => {
            const btn = document.getElementById('auth_submit_btn');
            if (window.location.protocol === 'file:') return window.showToast("Bitte über localhost testen (file:// blockiert SMS).", "error");
            const fullPhone = document.getElementById('auth_prefix').value + document.getElementById('auth_phone').value.trim().replace(/^0+/, '');
            state.tempPhone = fullPhone; btn.disabled = true; btn.innerText = "Transmitting...";
            try {
                if (!window.recaptchaVerifier) window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' }); 
                window.confirmationResult = await signInWithPhoneNumber(auth, fullPhone, window.recaptchaVerifier);
                state.authStep = 'code'; render();
            } catch (err) { window.showToast(err.message, "error"); btn.disabled = false; btn.innerText = "Admin Login"; }
        };

        window.verifyCode = async () => {
            const btn = document.getElementById('verify_submit_btn'); btn.disabled = true; btn.innerText = "Verifying...";
            try { await window.confirmationResult.confirm(document.getElementById('auth_code').value); } 
            catch (err) { window.showToast("Invalid sequence.", "error"); btn.disabled = false; btn.innerText = "Verify Access"; }
        };
        window.goBackToPhone = () => { state.authStep = 'phone'; render(); };

        // --- Render Engine ---
        function render() {
            const appDiv = document.getElementById('app');

            if (state.view === 'loading') { appDiv.innerHTML = `<div class="flex-1 flex items-center justify-center min-h-[60vh]"><div class="w-16 h-16 border-t-4 border-l-4 border-[#ff4d00] rounded-full animate-spin"></div></div>`; return; }

            if (state.view === 'onboarding') {
                appDiv.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 min-h-[80vh] text-center">
                        <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-2">ADMIN ACCESS<span class="text-[#ff4d00]">.</span></h1>
                        <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mb-12 max-w-sm leading-relaxed">Master Profil anlegen.</p>
                        <form onsubmit="window.submitOnboarding(event)" class="w-full max-w-sm space-y-4">
                            <input id="onboard_name" type="text" placeholder="Admin Name" required class="w-full p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm outline-none focus:border-[#ff4d00] text-white transition text-center text-xl tracking-widest uppercase font-black italic">
                            <div class="relative">
                                <select id="onboard_city" required class="w-full p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm outline-none focus:border-[#ff4d00] text-white transition text-center text-lg tracking-widest uppercase font-bold appearance-none cursor-pointer">
                                    <option value="Köln" selected>📍 Köln</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full btn-grind py-4 mt-2">Initialize Admin</button>
                        </form>
                    </div>
                `; return;
            }

            if (state.view === 'denied') {
                appDiv.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-6 text-center"><h1 class="text-4xl font-black text-red-600 mb-2">ACCESS DENIED</h1><p class="text-gray-500 text-xs uppercase tracking-widest mb-6">You lack Command Center privileges.</p><button type="button" onclick="window.handleLogout()" class="btn-grind py-3">Exit System</button></div>`;
                return;
            }

            if (state.view === 'auth') {
                let authHtml = `<div class="flex-1 flex flex-col items-center justify-center p-6 min-h-[80vh] text-center"><h1 class="text-4xl font-black italic tracking-tighter mb-2">COMMAND <span class="text-[#ff4d00]">CENTER</span></h1><p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mb-12">Authorized Personnel Only</p><div class="w-full max-w-sm">`;
                if (state.authStep === 'phone') { authHtml += `<div class="space-y-4"><div class="flex gap-2"><select id="auth_prefix" class="w-24 p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm outline-none text-gray-400 text-center font-bold"><option value="+49">🇩🇪 +49</option></select><input id="auth_phone" type="tel" placeholder="170 1234567" required class="flex-1 p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm text-white text-center tracking-widest"></div><button id="auth_submit_btn" onclick="window.sendSMS()" class="w-full btn-grind py-4">Admin Login</button></div>`; } 
                else { authHtml += `<div class="space-y-4"><input id="auth_code" type="text" placeholder="123456" required class="w-full p-4 bg-[#0f0f0f] border border-[#1f1f1f] rounded-sm text-white text-center text-3xl font-mono tracking-[0.3em]"><button id="verify_submit_btn" onclick="window.verifyCode()" class="w-full btn-grind py-4">Verify Identity</button><button type="button" onclick="window.goBackToPhone()" class="text-xs text-gray-500">Cancel</button></div>`; }
                authHtml += `</div></div>`; appDiv.innerHTML = authHtml; return;
            }

            if (state.view === 'admin') {
                const savedKey = localStorage.getItem('gemini_api_key') || '';
                let html = `<header class="p-6 max-w-6xl mx-auto w-full flex justify-between items-center"><h1 class="text-2xl font-black italic tracking-tighter">GRIND<span class="text-[#ff4d00]">.</span></h1><button type="button" onclick="window.handleLogout()" class="text-[10px] uppercase font-bold text-gray-500 border border-gray-800 px-3 py-1 rounded-sm hover:text-white transition">Logout</button></header><main class="max-w-6xl mx-auto px-6 w-full pb-20">`;
                
                html += `
                    <div class="mb-6"><h2 class="text-4xl font-black italic tracking-tighter">COMMAND <span class="text-[#ff4d00]">CENTER</span></h2></div>
                    <div class="flex gap-4 border-b border-[#1f1f1f] mb-8">
                        <button type="button" onclick="window.setAdminTab('control')" class="admin-tab ${state.adminTab === 'control' ? 'active' : ''}">Season Control</button>
                        <button type="button" onclick="window.setAdminTab('proofs')" class="admin-tab ${state.adminTab === 'proofs' ? 'active' : ''}">Pending Proofs <span class="bg-[#ff4d00]/20 text-[#ff4d00] px-1.5 py-0.5 rounded-sm ml-1">${state.pendingProofs.length}</span></button>
                    </div>
                `;

                if (state.adminTab === 'proofs') {
                    html += `
                        <div class="card p-6 rounded-sm max-w-3xl mx-auto">
                            <h3 class="text-lg font-black uppercase tracking-widest text-[#ff4d00] mb-4">Health & Hustle - Verifizierungen</h3>
                            <div class="space-y-4">
                                ${state.pendingProofs.length === 0 ? '<p class="text-xs text-gray-600 italic">Keine anstehenden Freigaben.</p>' : ''}
                                ${state.pendingProofs.map(p => {
                                    const safeData = btoa(encodeURIComponent(p.data));
                                    return `
                                    <div class="bg-[#050505] border border-white/10 p-4 rounded-sm flex flex-col gap-3">
                                        <div class="flex items-center gap-4">
                                            ${p.type === 'upload' ? `<img src="${p.data}" class="w-16 h-16 object-cover rounded-sm border border-[#1f1f1f]">` : `<div class="w-16 h-16 bg-gray-800 flex flex-col items-center justify-center text-[8px] text-gray-400 overflow-hidden p-1 border border-[#1f1f1f]"><span>QR CODE:</span><span class="text-white font-mono mt-1 break-all text-center">${p.data}</span></div>`}
                                            <div class="flex-1">
                                                <p class="font-black text-sm uppercase text-white">${p.missionName}</p>
                                                <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-1">${p.alias} • <span class="text-[#ff4d00]">+${p.xp} XP</span></p>
                                            </div>
                                            <div class="flex gap-2">
                                                <button type="button" id="ai_btn_${p.id}" onclick="window.aiCheckProof('${p.id}', '${p.missionName}', '${p.type}', '${safeData}')" class="w-8 h-8 rounded-sm bg-blue-900/30 hover:bg-blue-600 border border-blue-900/50 text-white flex items-center justify-center transition" title="KI Analyse">🤖</button>
                                                <button type="button" onclick="window.rejectProof('${p.id}')" class="w-8 h-8 rounded-sm bg-red-900/30 hover:bg-red-600 border border-red-900/50 text-white flex items-center justify-center transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                                <button type="button" onclick="window.acceptProof('${p.id}', '${p.uid}', '${p.mid}', ${p.xp})" class="w-8 h-8 rounded-sm bg-green-900/30 hover:bg-[#ff4d00] border border-green-900/50 text-white flex items-center justify-center transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></button>
                                            </div>
                                        </div>
                                        <div id="ai_res_${p.id}" class="text-[10px] text-blue-300 bg-blue-900/10 border border-blue-900/30 p-2 rounded-sm hidden leading-relaxed"></div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                } else if (state.adminTab === 'control') {
                    html += `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div class="space-y-8">
                                <div class="card p-6 rounded-sm">
                                    <div class="flex justify-between items-center mb-6">
                                        <h3 class="text-lg font-black uppercase tracking-widest text-[#ff4d00]">Operations Manager</h3>
                                        <select onchange="window.setAdminEditWeek(this.value)" class="bg-[#050505] border border-[#1f1f1f] text-white text-xs p-2 rounded-sm outline-none focus:border-[#ff4d00]">
                                            ${[1,2,3,4].map(w => `<option value="${w}" ${state.adminEditWeek == w ? 'selected' : ''}>Woche ${w}</option>`).join('')}
                                        </select>
                                    </div>
                                    
                                    <div id="mission_list_container" class="space-y-3 mb-8 custom-scroll max-h-64 overflow-y-auto pr-2">
                                        <!-- Rendered by window.renderMissions() -->
                                    </div>

                                    <div class="border-t border-[#1f1f1f] pt-6">
                                        <h4 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4">Manuell hinzufügen</h4>
                                        <div class="flex flex-col gap-3">
                                            <input id="new_mis_name" placeholder="Titel (z.B. Morning Run)" class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                            <input id="new_mis_desc" placeholder="Beschreibung" class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                            <div class="flex gap-3">
                                                <input id="new_mis_xp" type="number" placeholder="XP" class="w-1/2 p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                                <select id="new_mis_type" class="w-1/2 p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white appearance-none outline-none focus:border-[#ff4d00]">
                                                    <option value="qr">QR Scan</option>
                                                    <option value="upload">Upload</option>
                                                </select>
                                            </div>
                                            <button type="button" onclick="window.addManualMission()" class="w-full bg-white text-black font-black uppercase text-[10px] tracking-widest py-3 rounded-sm hover:bg-[#ff4d00] hover:text-white transition">Hinzufügen</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-8">
                                <div class="card p-6 rounded-sm">
                                    <h3 class="text-lg font-black uppercase tracking-widest text-[#ff4d00] mb-4">Loot Manager</h3>
                                    
                                    <div id="reward_list_container" class="max-h-48 overflow-y-auto custom-scroll pr-2 space-y-2 mb-6">
                                        <!-- Rendered by window.renderRewards() -->
                                    </div>

                                    <div class="border-t border-[#1f1f1f] pt-6">
                                        <h4 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4">Neuen Reward einstellen</h4>
                                        <div class="flex flex-col gap-3">
                                            <div class="flex gap-2">
                                                <input id="rew_lvl" type="number" min="1" max="30" placeholder="Level" class="w-1/3 p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                                <select id="rew_tier" class="w-2/3 p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00] appearance-none">
                                                    <option value="free">FREE Tier</option>
                                                    <option value="pro">PRO Tier</option>
                                                </select>
                                            </div>
                                            <input id="rew_title" placeholder="Titel (z.B. Free ESN Bar)" class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                            <select id="rew_type" onchange="window.updateRewardInfoPlaceholder(this.value)" class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00] appearance-none">
                                                <option value="qr">Lokal einlösen (Hold-to-Redeem)</option>
                                                <option value="shipping">Physischer Versand</option>
                                                <option value="link">Digital (Link / Code)</option>
                                            </select>
                                            <input id="rew_info" placeholder="Einlöse-Anweisung" class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-sm text-white outline-none focus:border-[#ff4d00]">
                                            <button type="button" onclick="window.addReward()" class="w-full bg-[#1f1f1f] hover:bg-[#ff4d00] text-white font-bold py-3 rounded-sm text-xs uppercase tracking-widest transition">Speichern</button>
                                        </div>
                                    </div>
                                </div>

                                <div class="card p-6 rounded-sm">
                                    <h3 class="text-lg font-black uppercase tracking-widest text-[#ff4d00] mb-4">AI Mission Architect</h3>
                                    <input type="password" id="ai_key" value="${savedKey}" oninput="window.saveApiKey(event)" placeholder="Gemini API Key..." class="w-full p-3 bg-[#050505] border border-[#1f1f1f] rounded-sm text-xs mb-4 text-gray-400 outline-none focus:border-[#ff4d00]">
                                    <button type="button" id="ai-gen-btn" onclick="window.generateAIQuests()" class="w-full btn-grind mb-4 text-xs py-3">KI: Generiere neue Ops</button>
                                    <div id="ai-result" class="min-h-[100px] border border-white/5 bg-[#050505] p-4 rounded-sm"><p class="text-[10px] text-gray-600 uppercase font-bold text-center italic mt-6">Warte auf Input...</p></div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</main>`; appDiv.innerHTML = html;

                if (state.adminTab === 'control') {
                    window.renderMissions();
                    window.renderRewards();
                }
            }
        }
    </script>
</body>
</html>
